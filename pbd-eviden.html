<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pengurusan Eviden PBD — Pendidikan Islam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --teh:#0E4C42; --teh-2:#146357; --teh-3:#1B7A68;
  --emas:#C79A4B; --emas-l:#EFD9A6; --emas-d:#9C7530;
  --krim:#FAF6EC; --kad:#FFFFFF; --tulisan:#1B2621; --tulisan-lembut:#647169;
  --garis:#E8E1CC; --merah:#B5493D; --hijau-ok:#3E7A4E;
  --radius:14px; --shadow:0 3px 14px rgba(14,76,66,.08); --shadow-lg:0 14px 40px rgba(14,76,66,.16);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--krim);color:var(--tulisan);font-family:'Inter',sans-serif;font-size:15px;}
h1,h2,h3,.display{font-family:'Fraunces',serif;font-weight:600;color:var(--teh);}
.eyebrow{font-family:'IBM Plex Mono',monospace;letter-spacing:.09em;text-transform:uppercase;font-size:11px;color:var(--emas-d);font-weight:600;}
button{font-family:'Inter',sans-serif;cursor:pointer;}
.btn{background:var(--teh);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:600;font-size:13.5px;transition:.15s;box-shadow:0 2px 6px rgba(14,76,66,.18);}
.btn:hover{background:var(--teh-2);transform:translateY(-1px);}
.btn.gold{background:linear-gradient(135deg,var(--emas),var(--emas-d));color:#fff;}
.btn.gold:hover{filter:brightness(1.06);}
.btn.ghost{background:transparent;color:var(--teh);border:1.5px solid var(--garis);box-shadow:none;}
.btn.ghost:hover{border-color:var(--teh);transform:none;background:#fff;}
.btn.danger{background:#fff;color:var(--merah);border:1.5px solid var(--merah);box-shadow:none;}
.btn.danger:hover{background:var(--merah);color:#fff;transform:none;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
input,select,textarea{font-family:'Inter',sans-serif;padding:10px 12px;border:1.5px solid var(--garis);border-radius:9px;font-size:14px;background:#fff;color:var(--tulisan);width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teh-3);box-shadow:0 0 0 3px rgba(20,99,87,.1);}
label{font-size:12px;font-weight:700;color:var(--tulisan-lembut);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em;}
.field{margin-bottom:14px;}
.card{background:var(--kad);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;border:1px solid rgba(14,76,66,.05);}
.hidden{display:none !important;}
#app{min-height:100vh;}

/* geometric star pattern (Islamic motif) as subtle background */
.geo-pattern{
  background-image:
    radial-gradient(circle at 0 0, rgba(255,255,255,.06) 1.5px, transparent 1.6px),
    radial-gradient(circle at 12px 12px, rgba(255,255,255,.06) 1.5px, transparent 1.6px);
  background-size:24px 24px;
}

/* LOGIN */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  background:linear-gradient(160deg,var(--teh) 0%,var(--teh-2) 45%,#0A382F 100%);}
#loginView::before{content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle at 1px 1px, rgba(239,217,166,.18) 1.5px, transparent 1.6px);
  background-size:26px 26px; opacity:.5;}
#loginView::after{content:'';position:absolute;width:520px;height:520px;border-radius:50%;
  background:radial-gradient(circle, rgba(199,154,75,.22), transparent 70%); top:-160px; right:-160px;}
.login-box{position:relative;z-index:2;width:390px;background:var(--kad);border-radius:20px;box-shadow:var(--shadow-lg);padding:40px 36px;}
.login-mark{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,var(--teh-3),var(--teh));color:var(--emas-l);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:24px;margin-bottom:18px;box-shadow:0 6px 16px rgba(14,76,66,.3);}
.login-box h1{font-size:23px;margin:0 0 4px;}
.login-box p.sub{color:var(--tulisan-lembut);font-size:13.5px;margin:0 0 26px;line-height:1.5;}
.role-toggle{display:flex;gap:8px;margin-bottom:18px;background:var(--krim);padding:4px;border-radius:11px;}
.role-toggle button{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:700;color:var(--tulisan-lembut);transition:.15s;}
.role-toggle button.active{background:var(--teh);color:#fff;box-shadow:0 2px 6px rgba(14,76,66,.25);}
.login-err{color:var(--merah);font-size:13px;margin-top:10px;min-height:16px;font-weight:600;}
.login-hint{margin-top:20px;font-size:11.5px;color:var(--tulisan-lembut);background:var(--krim);padding:12px 14px;border-radius:10px;line-height:1.7;border:1px dashed var(--garis);}

/* SHELL / SIDEBAR */
.shell{display:flex;min-height:100vh;}
.sidebar{width:236px;flex-shrink:0;background:linear-gradient(185deg,var(--teh) 0%,#0A3830 100%);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;position:relative;overflow:hidden;}
.sidebar::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px, rgba(239,217,166,.10) 1.4px, transparent 1.5px);background-size:22px 22px;pointer-events:none;}
.sb-brand{display:flex;align-items:center;gap:11px;padding:24px 20px 20px;position:relative;z-index:1;}
.sb-mark{width:38px;height:38px;border-radius:10px;background:rgba(239,217,166,.15);border:1px solid rgba(239,217,166,.3);color:var(--emas-l);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:19px;flex-shrink:0;}
.sb-title{font-family:'Fraunces',serif;font-weight:600;font-size:15px;line-height:1.2;}
.sb-sub{font-size:11px;color:var(--emas-l);opacity:.8;}
.sb-nav{display:flex;flex-direction:column;gap:3px;padding:10px 14px;flex:1;position:relative;z-index:1;}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:10px;border:none;background:transparent;color:rgba(255,255,255,.72);font-size:13.5px;font-weight:600;text-align:left;transition:.15s;}
.sb-item span{font-size:16px;}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.sb-item.active{background:rgba(239,217,166,.15);color:var(--emas-l);box-shadow:inset 3px 0 0 var(--emas);}
.sb-foot{padding:16px;border-top:1px solid rgba(255,255,255,.1);position:relative;z-index:1;}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--emas);color:var(--teh);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12.5px;flex-shrink:0;}
.sb-uname{font-size:12.5px;font-weight:700;color:#fff;}
.sb-urole{font-size:10.5px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.04em;}
.sb-logout{width:100%;color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.25);}
.sb-logout:hover{border-color:#fff;color:#fff;}
.main-area{flex:1;min-width:0;}
.wrap{max-width:1180px;margin:0 auto;padding:30px 32px 60px;}

/* HEADER */
.page-head{margin-bottom:20px;}
.page-head h1{margin:4px 0 0;font-size:26px;}

/* GRID/STATS */
.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin:16px 0 6px;}
.stat-card{background:var(--kad);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;border:1px solid rgba(14,76,66,.05);position:relative;overflow:hidden;}
.stat-card .ic{position:absolute;right:14px;top:14px;font-size:22px;opacity:.35;}
.stat-card .n{font-family:'Fraunces',serif;font-size:32px;color:var(--teh);font-weight:700;}
.stat-card .l{font-size:11.5px;color:var(--tulisan-lembut);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}

/* STUDENT CARDS (guru dashboard) */
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-top:14px;}
.student-card{background:var(--kad);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;border:1px solid rgba(14,76,66,.05);cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:10px;}
.student-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:rgba(199,154,75,.35);}
.sc-top{display:flex;align-items:center;gap:11px;}
.sc-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--teh-3),var(--teh));color:var(--emas-l);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
.sc-name{font-weight:700;font-size:14.5px;}
.sc-class{font-size:12px;color:var(--tulisan-lembut);}
.sc-bottom{display:flex;align-items:center;justify-content:space-between;}
.sc-ev{font-size:12px;color:var(--tulisan-lembut);}

/* TABLES (admin) */
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--tulisan-lembut);padding:10px 12px;border-bottom:2px solid var(--garis);font-weight:700;}
td{padding:12px;border-bottom:1px solid var(--garis);}
tr:hover td{background:#FBF8EF;}
.trow{display:flex;align-items:center;gap:9px;}
.mini-avatar{width:28px;height:28px;border-radius:50%;background:var(--emas-l);color:var(--emas-d);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10.5px;flex-shrink:0;}

.pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11.5px;font-weight:800;letter-spacing:.02em;}
.pill.tp1,.pill.tp2{background:#FBEAE6;color:var(--merah);}
.pill.tp3,.pill.tp4{background:#FBF1DE;color:#9A7623;}
.pill.tp5,.pill.tp6{background:#E4F0E6;color:var(--hijau-ok);}
.row-actions{display:flex;gap:8px;}
.row-actions button{padding:6px 11px;font-size:12px;border-radius:7px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:30px 0 4px;}
.section-head h2{font-size:18px;margin:0;}
.toolbar{display:flex;gap:10px;align-items:center;margin:14px 0;flex-wrap:wrap;}
.toolbar select,.toolbar input{width:auto;min-width:170px;}
.empty{padding:44px 20px;text-align:center;color:var(--tulisan-lembut);}
.empty .em-ic{font-size:30px;margin-bottom:8px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(10,20,17,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(2px);}
.modal{background:#fff;border-radius:16px;padding:30px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal h3{margin-top:0;font-size:19px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--teh);color:#fff;padding:12px 22px;border-radius:30px;font-size:13.5px;font-weight:700;box-shadow:0 8px 26px rgba(0,0,0,.25);z-index:200;}
.toast.err{background:var(--merah);}

/* STUDENT PROFILE */
.profile-banner{background:linear-gradient(120deg,var(--teh) 0%,var(--teh-3) 100%);border-radius:var(--radius);padding:26px 28px;color:#fff;position:relative;overflow:hidden;}
.profile-banner::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px, rgba(239,217,166,.12) 1.4px, transparent 1.5px);background-size:22px 22px;}
.profile-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;position:relative;z-index:1;}
.profile-id{display:flex;align-items:center;gap:14px;}
.pf-avatar{width:56px;height:56px;border-radius:50%;background:rgba(239,217,166,.18);border:1.5px solid rgba(239,217,166,.4);color:var(--emas-l);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:20px;flex-shrink:0;}
.profile-id .name{font-size:21px;color:#fff;}
.profile-id .meta{color:rgba(255,255,255,.72);font-size:13px;margin-top:2px;}
.tp-badge{background:rgba(239,217,166,.15);border:1px solid rgba(239,217,166,.35);border-radius:14px;padding:14px 22px;text-align:center;min-width:110px;}
.tp-badge .num{font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:var(--emas-l);}
.tp-badge .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;opacity:.85;color:#fff;}
.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:18px;}
@media(max-width:820px){.two-col{grid-template-columns:1fr;}}
.ev-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--garis);align-items:center;}
.ev-item:last-child{border-bottom:none;}
.ev-thumb{width:50px;height:50px;border-radius:9px;object-fit:cover;background:var(--krim);border:1px solid var(--garis);flex-shrink:0;}
.ev-thumb.pdf{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--teh);}
.ev-info{flex:1;min-width:0;}
.ev-info .t{font-weight:700;font-size:13.5px;}
.ev-info .d{font-size:11.5px;color:var(--tulisan-lembut);margin-top:1px;}
.rate-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}

/* PRINT */
#printArea{display:none;}
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{display:block;position:absolute;top:0;left:0;width:100%;padding:20px 30px;}
  .no-print{display:none !important;}
}
.pr-header{display:flex;justify-content:space-between;border-bottom:3px solid #0E4C42;padding-bottom:10px;margin-bottom:16px;}
.pr-header h1{margin:0;font-size:20px;}
.pr-table{width:100%;border-collapse:collapse;margin-bottom:14px;}
.pr-table th,.pr-table td{border:1px solid #ccc;padding:6px 8px;font-size:12px;text-align:left;}
</style>
</head>
<body>
<div id="app"></div>
<div id="printArea"></div>

<script>
/* ============ STORAGE HELPERS (via Google Apps Script + Google Sheets) ============ */
let API_URL = localStorage.getItem('pbd_api_url') || '';

async function apiCall(payload){
  if(!API_URL){ toast('Sambungan Google Sheets belum ditetapkan.', true); return null; }
  try{
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if(!json.ok){ toast('Ralat pelayan: '+(json.error||'tidak diketahui'), true); return null; }
    return json.data;
  }catch(e){
    toast('Ralat menyimpan data: gagal hubungi Google Sheets.', true);
    return null;
  }
}
async function sGet(key){
  const raw = await apiCall({action:'get', key});
  if(raw===null || raw===undefined) return null;
  try{ return JSON.parse(raw); }catch(e){ return null; }
}
async function sSet(key, value){
  const r = await apiCall({action:'set', key, value: JSON.stringify(value)});
  return r===null ? null : true;
}
async function uploadFileToDrive(filename, mimeType, base64){
  return await apiCall({action:'uploadFile', filename, mimeType, base64});
}
function initials(name){
  return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

/* ============ APP STATE ============ */
let DB = { meta:null, students:[], evidenceCache:{}, notesCache:{} };
let SESSION = null;
let VIEW = { page:'login', tab:'guru', classFilter:'ALL', studentId:null };

const DEFAULT_CLASSES = ['Tahun 3A','Tahun 3B','Tahun 3E','Tahun 4A','Tahun 4C','Tahun 4D','Tahun 6B','Tahun 6C'];
const DEFAULT_TOPICS = [
 "Konsep Nama Allah Al-Alim & Al-Hakim","Konsep Bersuci Dalam Islam","Wahyu Teragung","Adab Tidur",
 "Solat Yang Sempurna","Hadis Yang Muda Dikasihi Yang Tua Dihormati","Adab Menuntut Ilmu",
 "Beriman Kepada Kitab","Konsep Sunat Ab'ad & Haiat","Nabi Muhammad & Masyarakat Mekkah",
 "Konsep Bersyukur","Sunnah Rasulullah"
];
const TP_DESC = {
 1:"Tahu", 2:"Tahu dan Faham", 3:"Tahu, Faham dan Boleh Buat",
 4:"Tahu, Faham dan Buat dengan Baik", 5:"Tahu, Faham dan Buat dengan Beradab",
 6:"Tahu, Faham dan Buat dengan Beradab Mithali (Contoh Terpuji)"
};

/* ============ SETUP SCREEN (Apps Script URL) ============ */
function renderSetup(prefillErr){
  const el = document.getElementById('app');
  el.innerHTML = `
  <div id="loginView">
    <div class="login-box" style="width:440px;">
      <div class="login-mark">🔗</div>
      <h1>Sambung ke Google Sheets</h1>
      <p class="sub">Tampal URL Web App Apps Script (lihat panduan yang diberikan) supaya semua data eviden PBD boleh disimpan &amp; dikongsi antara guru.</p>
      <div class="field"><label>URL Web App Apps Script</label><input id="apiUrlInput" placeholder="https://script.google.com/macros/s/xxxxx/exec"></div>
      <button class="btn" style="width:100%" id="apiUrlBtn">Sambung &amp; Teruskan</button>
      <div class="login-err" id="apiUrlErr">${prefillErr||''}</div>
      <div class="login-hint">URL ini disimpan pada peranti ini sahaja (localStorage pelayar). Setiap peranti/guru perlu tampal URL yang sama sekali sahaja.</div>
    </div>
  </div>`;
  document.getElementById('apiUrlBtn').onclick=async ()=>{
    const v = document.getElementById('apiUrlInput').value.trim();
    if(!v.startsWith('https://script.google.com/')){ document.getElementById('apiUrlErr').textContent='URL tidak sah. Pastikan ia bermula dengan https://script.google.com/'; return; }
    API_URL = v; localStorage.setItem('pbd_api_url', v);
    document.getElementById('apiUrlErr').textContent='Menguji sambungan...';
    const test = await apiCall({action:'get', key:'meta'});
    if(test===null){ document.getElementById('apiUrlErr').textContent='Gagal sambung. Semak semula URL & tetapan deployment (Who has access: Anyone).'; return; }
    boot();
  };
}

/* ============ INIT / SEED ============ */
async function boot(){
  if(!API_URL){ renderSetup(); return; }
  let meta = await sGet('meta');
  if(!meta){
    meta = {
      users:[{username:'admin', password:'admin123', role:'admin', name:'Pentadbir Sistem'}],
      classes:[...DEFAULT_CLASSES],
      topics:[...DEFAULT_TOPICS]
    };
    await sSet('meta', meta);
  }
  DB.meta = meta;
  DB.students = await sGet('students') || [];
  renderLogin();
}

function toast(msg, isErr=false){
  const t = document.createElement('div');
  t.className = 'toast'+(isErr?' err':'');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

/* ============ LOGIN ============ */
function renderLogin(){
  VIEW.page='login';
  const el = document.getElementById('app');
  el.innerHTML = `
  <div id="loginView">
    <div class="login-box">
      <div class="login-mark">ﷺ</div>
      <h1>Eviden PBD</h1>
      <p class="sub">Panitia Pendidikan Islam &middot; Sistem Pengurusan Eviden &amp; Tahap Penguasaan</p>
      <div class="role-toggle">
        <button id="rtGuru" class="active">Guru</button>
        <button id="rtAdmin">Admin</button>
      </div>
      <div class="field"><label>Nama Pengguna</label><input id="liUser" placeholder="cth: cikguain"></div>
      <div class="field"><label>Kata Laluan</label><input id="liPass" type="password" placeholder="••••••••"></div>
      <button class="btn" style="width:100%" id="liBtn">Log Masuk</button>
      <div class="login-err" id="liErr"></div>
      <div class="login-hint">Akaun admin pertama: <b>admin</b> / <b>admin123</b>. Guru perlu ditambah oleh Admin dahulu di panel Urus Guru.</div>
      <div style="text-align:center;margin-top:14px;"><a href="#" id="reconfigLink" style="font-size:11.5px;color:var(--tulisan-lembut);">Tukar sambungan Google Sheets</a></div>
    </div>
  </div>`;
  document.getElementById('reconfigLink').onclick=(e)=>{ e.preventDefault(); renderSetup(); };
  let role='guru';
  document.getElementById('rtGuru').onclick=()=>{role='guru';document.getElementById('rtGuru').classList.add('active');document.getElementById('rtAdmin').classList.remove('active');};
  document.getElementById('rtAdmin').onclick=()=>{role='admin';document.getElementById('rtAdmin').classList.add('active');document.getElementById('rtGuru').classList.remove('active');};
  document.getElementById('liBtn').onclick=async ()=>{
    const u = document.getElementById('liUser').value.trim();
    const p = document.getElementById('liPass').value;
    const found = DB.meta.users.find(x=>x.username===u && x.password===p && x.role===role);
    if(!found){ document.getElementById('liErr').textContent='Nama pengguna, kata laluan, atau peranan tidak sepadan.'; return; }
    SESSION = found;
    if(role==='admin') renderAdmin(); else renderGuru();
  };
  document.getElementById('liPass').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('liBtn').click(); });
}

function logout(){ SESSION=null; renderLogin(); }

/* ============ APP SHELL (SIDEBAR) ============ */
function appShell(activeKey, innerHTML){
  const isAdmin = SESSION.role==='admin';
  const navItems = isAdmin ? [
    {key:'guru', label:'Urus Guru', icon:'👤'},
    {key:'murid', label:'Urus Murid', icon:'🎓'},

/* ============ TP CALCULATION ============ */
function calcTP(evList){
  if(!evList || evList.length===0) return 1;
  const p1 = evList.filter(e=>e.penggal==='1');
  const p2 = evList.filter(e=>e.penggal==='2');
  const avgRating = evList.reduce((s,e)=>s+Number(e.rating||1),0)/evList.length;
  const consistency = (p1.length>0 && p2.length>0) ? 1 : (p1.length>0||p2.length>0 ? 0.45 : 0);
  const countScore = Math.min(evList.length,6)/6;
  const raw = (avgRating/3)*0.5 + consistency*0.3 + countScore*0.2;
  return Math.min(6, Math.max(1, Math.round(raw*6)));
}
function tpOf(student){
  if(student._override!=null && student._override!==undefined) return student._override;
  return calcTP(student._evidence||[]);
}

function openEvidenceModal(){
  const topicOpts = DB.meta.topics.map(t=>`<option value="${t}">${t}</option>`).join('');
  const today = new Date().toISOString().slice(0,10);
  showModal(`
    <h3>Upload Eviden</h3>
    <div class="field"><label>Tajuk Eviden</label><select id="evTopic">${topicOpts}</select></div>
    <div class="field"><label>Penggal</label><select id="evPenggal"><option value="1">Penggal 1</option><option value="2">Penggal 2</option></select></div>
    <div class="field"><label>Tarikh</label><input type="date" id="evDate" value="${today}"></div>
    <div class="field"><label>Tahap Eviden (Penilaian Guru)</label><select id="evRating"><option value="3">Tinggi</option><option value="2" selected>Sederhana</option><option value="1">Rendah</option></select></div>
    <div class="field"><label>Fail (Gambar JPG/PNG atau PDF)</label><input type="file" id="evFile" accept="image/jpeg,image/png,application/pdf"></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Batal</button>
    <button class="btn" id="evSaveBtn" onclick="saveEvidence()">Simpan Eviden</button></div>
  `);
}
async function saveEvidence(){
  const topic=document.getElementById('evTopic').value;
  const penggal=document.getElementById('evPenggal').value;
  const date=document.getElementById('evDate').value;
  const rating=document.getElementById('evRating').value;
  const fileInput=document.getElementById('evFile');
  const saveBtn=document.getElementById('evSaveBtn');
  if(!fileInput.files[0]){ toast('Sila pilih fail eviden.', true); return; }
  const file = fileInput.files[0];
  if(file.size > 8*1024*1024){ toast('Fail terlalu besar (had 8MB). Sila mampatkan.', true); return; }
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='Memuat naik...'; }
  const reader = new FileReader();
  reader.onload = async ()=>{
    const base64 = reader.result.split(',')[1];
    const uploaded = await uploadFileToDrive(file.name, file.type, base64);
    if(!uploaded || !uploaded.url){ if(saveBtn){saveBtn.disabled=false; saveBtn.textContent='Simpan Eviden';} toast('Gagal muat naik fail.', true); return; }
    const s = DB.students.find(x=>x.id===VIEW.studentId);
    const ev = {id:'e'+Date.now(), topic, penggal, date, rating, fileType:file.type, fileUrl:uploaded.url};
    s._evidence.push(ev);
    const res = await sSet('evidence:'+s.id, s._evidence);
    if(res===null){ s._evidence.pop(); if(saveBtn){saveBtn.disabled=false; saveBtn.textContent='Simpan Eviden';} return; }
    DB.evidenceCache[s.id]=s._evidence;
    closeModal(); toast('Eviden disimpan.'); paintProfile();
  };
  reader.readAsDataURL(file);
}
async function deleteEvidence(evId){
  if(!confirm('Padam eviden ini?')) return;
  const s = DB.students.find(x=>x.id===VIEW.studentId);
  s._evidence = s._evidence.filter(e=>e.id!==evId);
  await sSet('evidence:'+s.id, s._evidence);
  DB.evidenceCache[s.id]=s._evidence;
  toast('Eviden dipadam.'); paintProfile();
}

    <div class="field"><label>TP Muktamad</label><select id="ovVal"><option value="">-- Guna Auto-Generate --</option>${opts}</select></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Batal</button>
    <button class="btn" onclick="saveOverride()">Simpan</button></div>
  `);
}
async function saveOverride(){
  const v = document.getElementById('ovVal').value;
  const s = DB.students.find(x=>x.id===VIEW.studentId);
  s._override = v===''? null : Number(v);
  await sSet('tpover:'+s.id, {v:s._override});
  closeModal(); toast('TP dikemas kini.'); paintProfile();
}

/* --- notes --- */
async function saveNotes(){
  const s = DB.students.find(x=>x.id===VIEW.studentId);
  const notes = {p:document.getElementById('noteP').value, k:document.getElementById('noteK').value, c:document.getElementById('noteC').value};
  await sSet('notes:'+s.id, notes);
  DB.notesCache[s.id]=notes;
  toast('Catatan disimpan.');
}

/* --- print --- */
function printReport(){
  const s = DB.students.find(x=>x.id===VIEW.studentId);
  const notes = DB.notesCache[s.id] || {p:'',k:'',c:''};
  const tp = tpOf(s);
  const p1 = s._evidence.filter(e=>e.penggal==='1');
  const p2 = s._evidence.filter(e=>e.penggal==='2');
  const evRow = e=>`<tr><td>${e.topic}</td><td>${e.date}</td><td>${ratingLabel(e.rating)}</td></tr>`;
  document.getElementById('printArea').innerHTML = `
    <div class="pr-header"><div><h1>Laporan PBD — Pendidikan Islam</h1><div style="font-size:12px;color:#555;">Dijana pada ${new Date().toLocaleDateString('ms-MY')}</div></div>
    <div style="text-align:right;font-size:12px;"><b>${s.name}</b><br>${s.class}</div></div>
    <table class="pr-table"><tr><th style="width:30%">Tahap Penguasaan (TP) Muktamad</th><td><b>TP${tp}</b> — ${TP_DESC[tp]}</td></tr></table>
    <h3 style="font-size:14px;">Eviden Penggal 1 (${p1.length})</h3>
    <table class="pr-table"><thead><tr><th>Tajuk</th><th>Tarikh</th><th>Tahap</th></tr></thead><tbody>${p1.map(evRow).join('')||'<tr><td colspan=3>Tiada</td></tr>'}</tbody></table>
    <h3 style="font-size:14px;">Eviden Penggal 2 (${p2.length})</h3>
    <table class="pr-table"><thead><tr><th>Tajuk</th><th>Tarikh</th><th>Tahap</th></tr></thead><tbody>${p2.map(evRow).join('')||'<tr><td colspan=3>Tiada</td></tr>'}</tbody></table>
    <h3 style="font-size:14px;">Catatan Guru</h3>
    <table class="pr-table">
      <tr><th style="width:25%">Pemerhatian</th><td>${notes.p||'-'}</td></tr>
      <tr><th>Komen Prestasi</th><td>${notes.k||'-'}</td></tr>
      <tr><th>Cadangan</th><td>${notes.c||'-'}</td></tr>
    </table>
    <div style="margin-top:30px;font-size:12px;">Tandatangan Guru: ______________________</div>
  `;
  window.print();
}

/* ============ MODAL HELPERS ============ */
function showModal(html){
  const bg = document.createElement('div');
  bg.className='modal-bg'; bg.id='modalBg';
  bg.innerHTML = `<div class="modal">${html}</div>`;
  bg.onclick=(e)=>{ if(e.target.id==='modalBg') closeModal(); };
  document.body.appendChild(bg);
}
function closeModal(){ const m=document.getElementById('modalBg'); if(m) m.remove(); }

boot();
</script>
</body>
</html>

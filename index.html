<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pengurusan Eviden PBD — Pendidikan Islam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --hijau:#1B7A4B; --hijau-2:#146A40; --hijau-gelap:#0F5233;
  --emas:#D4A73B; --emas-l:#F3E3B8; --emas-d:#A9832A;
  --krim:#F4F7F4; --kad:#FFFFFF; --tulisan:#1E2A24; --tulisan-lembut:#6B7A70;
  --garis:#E6ECE6; --merah:#C0463A; --hijau-ok:#2E8B57;
  --radius:14px; --shadow:0 2px 10px rgba(20,60,40,.07); --shadow-lg:0 12px 34px rgba(20,60,40,.15);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--krim);color:var(--tulisan);font-family:'Inter',sans-serif;font-size:15px;}
h1,h2,h3,.display{font-family:'Inter',sans-serif;font-weight:800;color:var(--hijau-gelap);letter-spacing:-.01em;}
.eyebrow{font-family:'Inter',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-size:11px;color:var(--emas-d);font-weight:700;}
button{font-family:'Inter',sans-serif;cursor:pointer;}
.btn{background:var(--hijau);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13.5px;transition:.15s;box-shadow:0 2px 6px rgba(20,60,40,.18);}
.btn:hover{background:var(--hijau-2);transform:translateY(-1px);}
.btn.gold{background:var(--emas);color:#3A2C0A;}
.btn.gold:hover{filter:brightness(1.05);}
.btn.ghost{background:transparent;color:var(--hijau);border:1.5px solid var(--garis);box-shadow:none;}
.btn.ghost:hover{border-color:var(--hijau);transform:none;background:#fff;}
.btn.danger{background:#fff;color:var(--merah);border:1.5px solid var(--merah);box-shadow:none;}
.btn.danger:hover{background:var(--merah);color:#fff;transform:none;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
input,select,textarea{font-family:'Inter',sans-serif;padding:10px 12px;border:1.5px solid var(--garis);border-radius:9px;font-size:14px;background:#fff;color:var(--tulisan);width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--hijau);box-shadow:0 0 0 3px rgba(27,122,75,.1);}
label{font-size:12px;font-weight:700;color:var(--tulisan-lembut);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em;}
.field{margin-bottom:14px;}
.card{background:var(--kad);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;border:1px solid rgba(20,60,40,.05);}
.hidden{display:none !important;}
#app{min-height:100vh;}

/* geometric star pattern (Islamic motif) as subtle background */
.geo-pattern{
  background-image:
    radial-gradient(circle at 0 0, rgba(255,255,255,.06) 1.5px, transparent 1.6px),
    radial-gradient(circle at 12px 12px, rgba(255,255,255,.06) 1.5px, transparent 1.6px);
  background-size:24px 24px;
}

/* LOGIN */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--krim);padding:20px;}
.login-box{width:100%;max-width:390px;background:var(--kad);border-radius:20px;box-shadow:var(--shadow-lg);padding:36px 32px;border:1px solid var(--garis);}
.login-mark{width:52px;height:52px;border-radius:14px;background:var(--hijau);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px;box-shadow:0 6px 16px rgba(20,60,40,.25);}
.login-box h1{font-size:22px;margin:0 0 4px;text-align:center;}
.login-box p.sub{color:var(--tulisan-lembut);font-size:13.5px;margin:0 0 24px;line-height:1.5;text-align:center;}
.role-toggle{display:flex;gap:8px;margin-bottom:18px;background:var(--krim);padding:4px;border-radius:11px;}
.role-toggle button{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:700;color:var(--tulisan-lembut);transition:.15s;}
.role-toggle button.active{background:var(--hijau);color:#fff;box-shadow:0 2px 6px rgba(20,60,40,.25);}
.login-err{color:var(--merah);font-size:13px;margin-top:10px;min-height:16px;font-weight:600;}
.login-hint{margin-top:20px;font-size:11.5px;color:var(--tulisan-lembut);background:var(--krim);padding:12px 14px;border-radius:10px;line-height:1.7;border:1px dashed var(--garis);}

/* TOP NAVBAR (matches Khatam Tracker style) */
.topnav{background:var(--hijau);position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.topnav-row1{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 20px 8px;}
.tn-brand{display:flex;align-items:center;gap:9px;min-width:0;}
.tn-logo{font-size:19px;flex-shrink:0;}
.tn-title{font-weight:800;font-size:15.5px;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tn-tabs-row{max-width:1280px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 20px 10px;}
.tn-tabs-row::-webkit-scrollbar{display:none;}
.tn-item{display:flex;align-items:center;gap:6px;white-space:nowrap;padding:8px 13px;border-radius:9px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);font-size:13px;font-weight:700;flex-shrink:0;border-bottom:2.5px solid transparent;}
.tn-item span{font-size:14px;}
.tn-item:hover{color:#fff;}
.tn-item.active{color:#fff;background:rgba(255,255,255,.18);border-bottom-color:var(--emas);}
.tn-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.tn-user{background:rgba(255,255,255,.14);color:#fff;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:20px;white-space:nowrap;}
.tn-logout{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.3);padding:7px 13px;border-radius:20px;font-size:12.5px;font-weight:700;white-space:nowrap;}
.tn-logout:hover{background:rgba(255,255,255,.2);}
.main-area{flex:1;min-width:0;}
.wrap{max-width:1180px;margin:0 auto;padding:22px 20px 60px;}
@media(max-width:640px){
  .topnav-row1{padding:10px 14px 8px;}
  .tn-user{display:none;}
  .tn-title{font-size:13.5px;}
  .wrap{padding:16px 14px 50px;}
  .tn-tabs-row{padding:0 14px 9px;gap:5px;}
  .tn-item{padding:7px 10px;font-size:12px;}
  .tn-item span{font-size:13px;}
  .tn-logout{padding:6px 10px;font-size:11.5px;}
}

/* HEADER / SCHOOL BANNER */
.school-banner{background:linear-gradient(120deg,var(--hijau) 0%,var(--hijau-gelap) 100%);border-radius:var(--radius);padding:22px 26px;color:#fff;display:flex;align-items:center;gap:16px;margin-bottom:18px;}
.school-banner .sb-emoji{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.school-banner .sb-name{font-size:19px;font-weight:800;color:#fff;}
.school-banner .sb-meta{font-size:12.5px;color:rgba(255,255,255,.75);margin-top:2px;}
.page-head{margin-bottom:6px;}
.page-head h1{margin:4px 0 0;font-size:22px;}
@media(max-width:640px){ .page-head h1{font-size:19px;} .school-banner{padding:16px 18px;} .school-banner .sb-name{font-size:16px;} }

/* GRID/STATS */
.grid-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0 6px;}
.stat-card{background:var(--kad);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 14px;border:1px solid var(--garis);text-align:center;}
.stat-card .ic{font-size:24px;display:block;margin-bottom:6px;}
.stat-card .n{font-size:28px;color:var(--hijau-gelap);font-weight:800;}
.stat-card .l{font-size:11px;color:var(--tulisan-lembut);font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}
@media(max-width:640px){ .grid-cards{grid-template-columns:repeat(2,1fr);gap:9px;} .stat-card{padding:14px 8px;} .stat-card .n{font-size:22px;} .stat-card .ic{font-size:19px;} .stat-card .l{font-size:9.5px;} }

/* STUDENT LIST (guru dashboard) */
.student-list{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.student-row{background:var(--kad);border-radius:12px;box-shadow:var(--shadow);padding:13px 16px;border:1px solid var(--garis);cursor:pointer;transition:.15s;}
.student-row:hover{box-shadow:var(--shadow-lg);border-color:rgba(212,167,59,.4);}
.sc-top{display:flex;align-items:center;gap:12px;}
.sc-avatar{width:40px;height:40px;border-radius:50%;background:var(--emas-l);color:var(--emas-d);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.sc-name{font-weight:800;font-size:13.5px;letter-spacing:.01em;}
.sc-class{font-size:11.5px;color:var(--tulisan-lembut);}
.sc-right{margin-left:auto;text-align:right;flex-shrink:0;}
.sc-ev{font-size:11px;color:var(--tulisan-lembut);}
.sc-bar-track{height:6px;background:var(--garis);border-radius:4px;margin-top:10px;overflow:hidden;}
.sc-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--hijau),var(--hijau-2));}

/* TABLES (admin) */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:480px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--tulisan-lembut);padding:10px 12px;border-bottom:2px solid var(--garis);font-weight:700;}
td{padding:12px;border-bottom:1px solid var(--garis);}
tr:hover td{background:#F5F9F5;}
.trow{display:flex;align-items:center;gap:9px;}
.mini-avatar{width:28px;height:28px;border-radius:50%;background:var(--emas-l);color:var(--emas-d);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10.5px;flex-shrink:0;}

.pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11.5px;font-weight:800;letter-spacing:.02em;}
.pill.tp1,.pill.tp2{background:#FBEAE6;color:var(--merah);}
.pill.tp3,.pill.tp4{background:#FBF1DE;color:#9A7623;}
.pill.tp5,.pill.tp6{background:#E4F0E6;color:var(--hijau-ok);}
.row-actions{display:flex;gap:8px;}
.row-actions button{padding:6px 11px;font-size:12px;border-radius:7px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:30px 0 4px;}
.section-head h2{font-size:18px;margin:0;}
.toolbar{display:flex;gap:10px;align-items:center;margin:14px 0;flex-wrap:wrap;}
.tajuk-subtab{padding:9px 18px;border-radius:9px;border:1.5px solid var(--garis);background:#fff;color:var(--tulisan-lembut);font-weight:700;font-size:13.5px;margin-right:8px;}
.tajuk-subtab.active{background:var(--hijau);color:#fff;border-color:var(--hijau);}
.toolbar select,.toolbar input{width:auto;min-width:170px;}
.empty{padding:44px 20px;text-align:center;color:var(--tulisan-lembut);}
.empty .em-ic{font-size:30px;margin-bottom:8px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(10,20,17,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(2px);}
.modal{background:#fff;border-radius:16px;padding:30px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal h3{margin-top:0;font-size:19px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--hijau);color:#fff;padding:12px 22px;border-radius:30px;font-size:13.5px;font-weight:700;box-shadow:0 8px 26px rgba(0,0,0,.25);z-index:200;}
.toast.err{background:var(--merah);}

/* STUDENT PROFILE */
.profile-banner{background:linear-gradient(120deg,var(--hijau) 0%,var(--hijau-gelap) 100%);border-radius:var(--radius);padding:24px 26px;color:#fff;}
.profile-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;}
.profile-id{display:flex;align-items:center;gap:14px;}
.pf-avatar{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.35);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0;}
.profile-id .name{font-size:19px;color:#fff;font-weight:800;}
.profile-id .meta{color:rgba(255,255,255,.72);font-size:12.5px;margin-top:2px;}
.tp-badge{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);border-radius:14px;padding:12px 20px;text-align:center;min-width:100px;}
.tp-badge .num{font-size:28px;font-weight:800;color:var(--emas-l);}
.tp-badge .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;opacity:.85;color:#fff;}
.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:18px;}
@media(max-width:820px){.two-col{grid-template-columns:1fr;}}
@media(max-width:640px){.profile-id .name{font-size:16.5px;} .pf-avatar{width:44px;height:44px;font-size:15px;} .tp-badge{padding:10px 16px;} .tp-badge .num{font-size:24px;}}
.ev-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--garis);align-items:center;}
.ev-item:last-child{border-bottom:none;}
.ev-thumb{width:50px;height:50px;border-radius:9px;object-fit:cover;background:var(--krim);border:1px solid var(--garis);flex-shrink:0;}
.ev-thumb.pdf{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--hijau);}
.ev-info{flex:1;min-width:0;}
.ev-info .t{font-weight:700;font-size:13.5px;}
.ev-info .d{font-size:11.5px;color:var(--tulisan-lembut);margin-top:1px;}
.rate-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}

/* PRINT */
#printArea{display:none;}

/* TP REFERENCE GUIDE */
.tpref-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px;}
@media(max-width:700px){.tpref-grid{grid-template-columns:1fr;}}
.tpref-card{background:var(--kad);border:2px solid var(--garis);border-radius:var(--radius);padding:16px 18px;display:flex;gap:14px;align-items:flex-start;box-shadow:var(--shadow);}
.tpref-num{font-size:44px;font-weight:900;line-height:1;flex-shrink:0;min-width:44px;font-family:'Inter',sans-serif;}
.tpref-title{font-weight:800;font-size:14.5px;color:var(--tulisan);}
.tpref-sub{font-weight:600;font-size:12px;color:var(--tulisan-lembut);}
.tpref-desc{font-size:12.5px;color:var(--tulisan-lembut);margin:6px 0;line-height:1.5;}
.tpref-list{margin:4px 0 0;padding-left:18px;font-size:12.5px;color:var(--tulisan);line-height:1.6;}
.tpref-list li{margin-bottom:2px;}
@page{ size:A4; margin:14mm; }
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{display:block;position:absolute;top:0;left:0;width:100%;padding:20px 30px;}
  .no-print{display:none !important;}
}
.pr-header{display:flex;justify-content:space-between;border-bottom:3px solid #0E4C42;padding-bottom:10px;margin-bottom:16px;}
.pr-header h1{margin:0;font-size:20px;}
.pr-table{width:100%;border-collapse:collapse;margin-bottom:14px;}
.pr-table th,.pr-table td{border:1px solid #ccc;padding:6px 8px;font-size:12px;text-align:left;}
</style>
</head>
<body>
<div id="app"></div>
<div id="printArea"></div>

<script>
/* ============ STORAGE HELPERS (via Google Apps Script + Google Sheets) ============ */
const HARDCODED_API_URL = 'https://script.google.com/macros/s/AKfycbxpgN7f49vUE45AepyqZOWJinETbn7ucz052UtoM1xzVcSabpd1oF8yX-q73DEniT5H/exec';
let API_URL = localStorage.getItem('pbd_api_url') || HARDCODED_API_URL;

async function apiCall(payload){
  if(!API_URL){ toast('Sambungan Google Sheets belum ditetapkan.', true); return null; }
  try{
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if(!json.ok){ toast('Ralat pelayan: '+(json.error||'tidak diketahui'), true); return null; }
    return json.data;
  }catch(e){
    toast('Ralat menyimpan data: gagal hubungi Google Sheets.', true);
    return null;
  }
}
async function sGet(key){
  const raw = await apiCall({action:'get', key});
  if(raw===null || raw===undefined) return null;
  try{ return JSON.parse(raw); }catch(e){ return null; }
}
async function sSet(key, value){
  const r = await apiCall({action:'set', key, value: JSON.stringify(value)});
  return r===null ? null : true;
}
async function uploadFileToDrive(filename, mimeType, base64){
  return await apiCall({action:'uploadFile', filename, mimeType, base64});
}
function initials(name){
  return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

/* ============ APP STATE ============ */
let DB = { meta:null, students:[], evidenceAll:{}, notesAll:{}, overridesAll:{}, verifiedAll:{}, anecdotesAll:{}, activityLog:[] };
let SESSION = null;
let VIEW = { page:'login', tab:'guru', classFilter:'ALL', studentId:null };

const DEFAULT_CLASSES = ['Tahun 3A','Tahun 3B','Tahun 3E','Tahun 4A','Tahun 4C','Tahun 4D','Tahun 6B','Tahun 6C'];
const DEFAULT_TOPICS_BY_YEAR = {
 "3": [
  "Konsep Nama Allah Al-Alim & Al-Hakim","Konsep Bersuci Dalam Islam","Wahyu Teragung","Adab Tidur",
  "Solat Yang Sempurna","Hadis Yang Muda Dikasihi Yang Tua Dihormati","Adab Menuntut Ilmu",
  "Beriman Kepada Kitab","Konsep Sunat Ab'ad & Haiat","Nabi Muhammad & Masyarakat Mekkah",
  "Konsep Bersyukur","Sunnah Rasulullah"
 ],
 "4": [
  "Pengertian Nama Allah Al-Azim & Al-Hamid","Mari Bersuci","Perjanjian Aqabah Pertama & Kedua",
  "Tutuplah Auratmu","Pengertian Nabi & Rasul","Azan & Iqamah","Sifat Fatonah Nabi Muhammad",
  "Adab Beriadah","Hadis Memuliakan Tetamu","Kufur","Puasa Ramadan","Dakwah",
  "Adab Berjiran","Nifak","Adab Berguru"
 ],
 "6": []
};
function yearOfClass(cls){
  const m = (cls||'').match(/(\d+)/);
  return m ? m[1] : 'Lain';
}
function jantinaOf(name){
  if(/\bbinti\b/i.test(name||'')) return 'P';
  if(/\bbin\b/i.test(name||'')) return 'L';
  return null;
}
function yearsFromClasses(){
  const set = new Set();
  (DB.meta.classes||[]).forEach(c=>{ const m=(c||'').match(/(\d+)/); if(m) set.add(m[1]); });
  return Array.from(set);
}
const TP_DESC = {
 1:"Tahu (Mengetahui)", 2:"Faham (Memahami)", 3:"Aplikasi (Mengaplikasi)",
 4:"Analisis (Menganalisis)", 5:"Menilai", 6:"Kreatif (Menjana Idea)"
};
const TP_INFO = {
 1:{title:'TAHU', sub:'Mengetahui', color:'#D93B3B',
    desc:'Mengetahui pengetahuan asas, kemahiran dan nilai dalam Pendidikan Islam.',
    bullets:['Mengenal huruf hijaiyah.','Mengetahui rukun Islam & Iman.','Mengetahui adab asas.']},
 2:{title:'FAHAM', sub:'Memahami', color:'#E8792A',
    desc:'Memahami pengetahuan asas, kemahiran dan nilai dalam Pendidikan Islam.',
    bullets:['Menjelaskan pengertian.','Menerangkan cara pelaksanaan ibadah.','Memahami sirah nabi.']},
 3:{title:'APLIKASI', sub:'Mengaplikasi', color:'#C9A415',
    desc:'Mengaplikasikan pengetahuan, kemahiran dan nilai dalam situasi berbeza.',
    bullets:['Melaksanakan solat dengan betul.','Membaca al-Quran dengan bertajwid.','Mengamalkan adab dalam kehidupan.']},
 4:{title:'ANALISIS', sub:'Menganalisis', color:'#1E8449',
    desc:'Menganalisis pengetahuan, kemahiran dan nilai serta mengamalkannya.',
    bullets:['Membezakan antara yang hak dan batil.','Menghuraikan hikmah ibadah.','Mengaitkan sirah dengan kehidupan.']},
 5:{title:'MENILAI', sub:'Menilai', color:'#1F5DA6',
    desc:'Menilai pengetahuan, kemahiran dan nilai serta mengamalkannya secara istiqamah.',
    bullets:['Membuat pertimbangan berdasarkan dalil.','Menghayati nilai murni.','Menjadi contoh teladan.']},

/* ============ INIT / SEED ============ */
async function boot(){
  if(!API_URL){ renderSetup(); return; }
  const [meta0, students0, evidenceAll0, notesAll0, overridesAll0, verifiedAll0, anecdotesAll0, activityLog0] = await Promise.all([
    sGet('meta'), sGet('students'), sGet('evidenceAll'), sGet('notesAll'), sGet('overridesAll'),
    sGet('verifiedAll'), sGet('anecdotesAll'), sGet('activityLog')
  ]);
  let meta = meta0;
  if(!meta){
    meta = {
      users:[{username:'admin', password:'admin123', role:'admin', name:'Pentadbir Sistem'}],
      classes:[...DEFAULT_CLASSES],
      topics: JSON.parse(JSON.stringify(DEFAULT_TOPICS_BY_YEAR))
    };
    await sSet('meta', meta);
  } else if(Array.isArray(meta.topics)){
    // migrate old flat topic list (was Tahun 3 content) into per-year structure
    meta.topics = {"3": meta.topics, "4": [], "6": []};
    await sSet('meta', meta);
  } else if(!meta.topics){
    meta.topics = JSON.parse(JSON.stringify(DEFAULT_TOPICS_BY_YEAR));
    await sSet('meta', meta);
  }
  if(meta.topics && Array.isArray(meta.topics["4"]) && meta.topics["4"].length===0 && DEFAULT_TOPICS_BY_YEAR["4"].length>0){
    meta.topics["4"] = [...DEFAULT_TOPICS_BY_YEAR["4"]];
    await sSet('meta', meta);
  }
  DB.meta = meta;
  DB.students = students0 || [];
  DB.evidenceAll = evidenceAll0 || {};
  DB.notesAll = notesAll0 || {};
  DB.overridesAll = overridesAll0 || {};
  DB.verifiedAll = verifiedAll0 || {};
  DB.anecdotesAll = anecdotesAll0 || {};
  DB.activityLog = activityLog0 || [];
  renderLogin();
}

/* ============ TP CALCULATION ============ */
function calcTP(evList){
  if(!evList || evList.length===0) return 1;
  const avgRating = evList.reduce((s,e)=>s+Number(e.rating||1),0)/evList.length;
  const countScore = Math.min(evList.length,6)/6;
  const raw = (avgRating/3)*0.65 + countScore*0.35;
  return Math.min(6, Math.max(1, Math.round(raw*6)));
}
function tpOf(student){
  const ov = DB.overridesAll[student.id];
  if(ov!=null) return ov;
  return calcTP((DB.evidenceAll[student.id]||[]).filter(e=>!e.deleted));
}

function downloadBackup(){
  const backup = {
    exportedAt: new Date().toISOString(),
    meta: DB.meta, students: DB.students, evidenceAll: DB.evidenceAll,
    notesAll: DB.notesAll, overridesAll: DB.overridesAll, verifiedAll: DB.verifiedAll,
    anecdotesAll: DB.anecdotesAll, activityLog: DB.activityLog
  };
  const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'backup-eviden-pbd-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  logActivity('Muat Turun Backup', '');
}
async function importBackup(file){
  if(!file) return;
  if(!confirm('Import akan GANTIKAN semua data semasa (murid, eviden, catatan, dll) dengan data dari fail backup ini. Teruskan?')) return;
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!data.meta || !data.students){ toast('Fail backup tidak sah.', true); return; }
    toast('Mengimport data...');
    await Promise.all([
      sSet('meta', data.meta), sSet('students', data.students), sSet('evidenceAll', data.evidenceAll||{}),
      sSet('notesAll', data.notesAll||{}), sSet('overridesAll', data.overridesAll||{}),
      sSet('verifiedAll', data.verifiedAll||{}), sSet('anecdotesAll', data.anecdotesAll||{}),
      sSet('activityLog', data.activityLog||[])
    ]);
    DB.meta = data.meta; DB.students = data.students; DB.evidenceAll = data.evidenceAll||{};
    DB.notesAll = data.notesAll||{}; DB.overridesAll = data.overridesAll||{}; DB.verifiedAll = data.verifiedAll||{};
    DB.anecdotesAll = data.anecdotesAll||{}; DB.activityLog = data.activityLog||[];
    toast('Import berjaya.'); logActivity('Import Backup', file.name); paintLog();
  }catch(e){
    toast('Gagal membaca fail backup.', true);
  }
}

async function saveUser(editIdx){
  const name=document.getElementById('mUName').value.trim();

  const role=document.getElementById('mURole').value;

  const dup = DB.meta.users.find((u,i)=>u.username===username && i!==editIdx);

async function deleteUser(i){
  if(!confirm('Padam akaun ini?')) return;
  const removed = DB.meta.users.splice(i,1);
  const ok = await sSet('meta', DB.meta);

}

async function saveStudent(editIdx){
  const name=document.getElementById('mSName').value.trim();
  const cls=document.getElementById('mSClass').value;
  if(!name){ toast('Sila masukkan nama murid.', true); return; }
  let added=null;
  if(editIdx!=null){ DB.students[editIdx].name=name; DB.students[editIdx].class=cls; }
  else { added = {id:'s'+Date.now()+Math.floor(Math.random()*999), name, class:cls}; DB.students.push(added); }

async function deleteStudent(i){
  if(!confirm('Padam murid ini? Rekod boleh dipulihkan dari Tong Sampah.')) return;
  const s = DB.students[i];
  s.deleted = true; s.deletedAt = new Date().toISOString();
  const ok = await sSet('students', DB.students);
  if(ok===null){ delete s.deleted; delete s.deletedAt; toast('Gagal padam. Cuba lagi.', true); return; }
  toast('Murid dipindah ke Tong Sampah.'); logActivity('Padam Murid (Tong Sampah)', s.name+' - '+s.class); paintMurid();
}
async function restoreStudent(id){
  const s = DB.students.find(x=>x.id===id);
  if(!s) return;
  delete s.deleted; delete s.deletedAt;
  const ok = await sSet('students', DB.students);
  if(ok===null){ s.deleted=true; toast('Gagal pulihkan. Cuba lagi.', true); return; }
  toast('Murid dipulihkan.'); logActivity('Pulihkan Murid', s.name); paintSampah();
}
async function permanentDeleteStudent(id){
  if(!confirm('Padam KEKAL murid ini beserta semua eviden/catatan? Tindakan ini TIDAK boleh dibatalkan.')) return;
  const idx = DB.students.findIndex(x=>x.id===id);
  if(idx===-1) return;
  const removed = DB.students.splice(idx,1)[0];
  const ok = await sSet('students', DB.students);
  if(ok===null){ DB.students.splice(idx,0,removed); toast('Gagal padam. Cuba lagi.', true); return; }
  delete DB.evidenceAll[removed.id]; delete DB.notesAll[removed.id]; delete DB.overridesAll[removed.id];
  delete DB.verifiedAll[removed.id]; delete DB.anecdotesAll[removed.id];
  await Promise.all([sSet('evidenceAll', DB.evidenceAll), sSet('notesAll', DB.notesAll), sSet('overridesAll', DB.overridesAll), sSet('verifiedAll', DB.verifiedAll), sSet('anecdotesAll', DB.anecdotesAll)]);
  toast('Murid dipadam kekal.'); logActivity('Padam Kekal Murid', removed.name+' - '+removed.class); paintSampah();
}

async function paintProfile(){

  const anecdotes = (DB.anecdotesAll[s.id]||[]).slice().sort((a,b)=> a.date<b.date?1:-1);
  const isVerified = !!DB.verifiedAll[s.id];
  const autoTP = calcTP(s._evidence);
  const tp = tpOf(s);
  const isAdminView = SESSION.role==='admin';
  const evRows = s._evidence.slice().sort((a,b)=> a.date<b.date?1:-1).map(ev=>{

      `<img class="ev-thumb" src="${ev.fileUrl}" onerror="this.style.opacity=0.3">` :

    return `<div class="ev-item">

        <button class="btn danger" style="padding:5px 10px;font-size:12px;" onclick="deleteEvidence('${ev.id}')">Padam</button>
      </div>
    </div>`;
  }).join('') || '<div class="empty"><div class="em-ic">📎</div>Belum ada eviden dimuat naik.</div>';

function compressImage(file, maxDim, quality){
  maxDim = maxDim||1280; quality = quality||0.72;
  return new Promise((resolve)=>{
    if(!file.type || !file.type.startsWith('image/')){ resolve(file); return; }
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w>maxDim || h>maxDim){ const scale = maxDim/Math.max(w,h); w=Math.round(w*scale); h=Math.round(h*scale); }
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob((blob)=>{ resolve(blob || file); }, 'image/jpeg', quality);
      };
      img.onerror = ()=>resolve(file);
      img.src = reader.result;
    };
    reader.onerror = ()=>resolve(file);
    reader.readAsDataURL(file);
  });
}

async function saveBulkEvidence(){
  const cls = document.getElementById('bulkClass').value;
  const topic = document.getElementById('bulkTopic').value;
  const date = document.getElementById('bulkDate').value;
  const rating = document.getElementById('bulkRating').value;
  const fileInput = document.getElementById('bulkFile');
  const saveBtn = document.getElementById('bulkSaveBtn');
  const checked = Array.from(document.querySelectorAll('.bulkStudentChk:checked')).map(c=>c.value);
  if(!topic){ toast('Tiada tajuk dipilih untuk kelas ini.', true); return; }
  if(checked.length===0){ toast('Sila pilih sekurang-kurangnya seorang murid.', true); return; }
  if(!fileInput.files[0]){ toast('Sila pilih fail.', true); return; }
  const file = fileInput.files[0];
  if(file.size > 12*1024*1024){ toast('Fail terlalu besar (had 12MB).', true); return; }
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='Memproses...'; }
  const processed = await compressImage(file);
  const mimeType = processed.type || file.type;
  const reader = new FileReader();
  reader.onload = async ()=>{
    const base64 = reader.result.split(',')[1];
    const uploaded = await uploadFileToDrive(file.name, mimeType, base64);
    if(!uploaded || !uploaded.url){ if(saveBtn){saveBtn.disabled=false; saveBtn.textContent='Simpan untuk Murid Dipilih';} toast('Gagal muat naik fail.', true); return; }
    checked.forEach((id,i)=>{
      if(!DB.evidenceAll[id]) DB.evidenceAll[id] = [];
      DB.evidenceAll[id].push({id:'e'+Date.now()+'-'+i, topic, date, rating, fileType:mimeType, fileUrl:uploaded.url});
    });
    const ok = await sSet('evidenceAll', DB.evidenceAll);
    if(ok===null){ toast('Gagal simpan ke Google Sheets.', true); if(saveBtn){saveBtn.disabled=false; saveBtn.textContent='Simpan untuk Murid Dipilih';} return; }
    for(const id of checked){ await unverify(id); }
    closeModal(); toast('Eviden pukal disimpan untuk '+checked.length+' murid.');
    logActivity('Upload Eviden Pukal', cls+' — '+topic+' ('+checked.length+' murid)');
    paintRekod();
  };
  reader.readAsDataURL(processed);
}

async function saveEvidence(){
  const topic=document.getElementById('evTopic').value;
  const date=document.getElementById('evDate').value;
  const rating=document.getElementById('evRating').value;
  const fileInput=document.getElementById('evFile');
  const saveBtn=document.getElementById('evSaveBtn');
  if(!fileInput.files[0]){ toast('Sila pilih fail eviden.', true); return; }
  const file = fileInput.files[0];
  if(file.size > 12*1024*1024){ toast('Fail terlalu besar (had 12MB).', true); return; }
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='Memampat & memuat naik...'; }
  const processed = await compressImage(file);
  const mimeType = processed.type || file.type;
  const reader = new FileReader();
  reader.onload = async ()=>{
    const base64 = reader.result.split(',')[1];
    const uploaded = await uploadFileToDrive(file.name, mimeType, base64);
    if(!uploaded || !uploaded.url){ if(saveBtn){saveBtn.disabled=false; saveBtn.textContent='Simpan Eviden';} toast('Gagal muat naik fail.', true); return; }
    const s = DB.students.find(x=>x.id===VIEW.studentId);
    const ev = {id:'e'+Date.now(), topic, date, rating, fileType:mimeType, fileUrl:uploaded.url};
    if(!DB.evidenceAll[s.id]) DB.evidenceAll[s.id] = [];
    DB.evidenceAll[s.id].push(ev);
    const ok = await sSet('evidenceAll', DB.evidenceAll);
    if(ok===null){ DB.evidenceAll[s.id].pop(); if(saveBtn){saveBtn.disabled=false; saveBtn.textContent='Simpan Eviden';} toast('Gagal simpan ke Google Sheets.', true); return; }
    await unverify(s.id);
    closeModal(); toast('Eviden disimpan.'); logActivity('Upload Eviden', s.name+' — '+topic); paintProfile();
  };
  reader.readAsDataURL(processed);
}
async function deleteEvidence(evId){
  if(!confirm('Padam eviden ini? Boleh dipulihkan dari Tong Sampah Eviden.')) return;
  const s = DB.students.find(x=>x.id===VIEW.studentId);
  const ev = (DB.evidenceAll[s.id]||[]).find(e=>e.id===evId);
  if(!ev) return;
  ev.deleted = true; ev.deletedAt = new Date().toISOString();
  const ok = await sSet('evidenceAll', DB.evidenceAll);
  if(ok===null){ delete ev.deleted; delete ev.deletedAt; toast('Gagal padam. Cuba lagi.', true); return; }
  await unverify(s.id);
  toast('Eviden dipindah ke Tong Sampah.'); logActivity('Padam Eviden (Tong Sampah)', s.name); paintProfile();
}
async function restoreEvidence(evId){
  const s = DB.students.find(x=>x.id===VIEW.studentId);
  const ev = (DB.evidenceAll[s.id]||[]).find(e=>e.id===evId);
  if(!ev) return;
  delete ev.deleted; delete ev.deletedAt;
  const ok = await sSet('evidenceAll', DB.evidenceAll);
  if(ok===null){ ev.deleted=true; toast('Gagal pulihkan. Cuba lagi.', true); return; }
  toast('Eviden dipulihkan.'); logActivity('Pulihkan Eviden', s.name); paintProfile();
}
async function permanentDeleteEvidence(evId){
  if(!confirm('Padam KEKAL eviden ini? Tindakan ini tidak boleh dibatalkan.')) return;
  const s = DB.students.find(x=>x.id===VIEW.studentId);
  DB.evidenceAll[s.id] = (DB.evidenceAll[s.id]||[]).filter(e=>e.id!==evId);
  const ok = await sSet('evidenceAll', DB.evidenceAll);
  if(ok===null){ toast('Gagal padam. Cuba lagi.', true); return; }
  toast('Eviden dipadam kekal.'); logActivity('Padam Kekal Eviden', s.name); paintProfile();
}

    <div style="text-align:right;font-size:12px;"><b>${cls}</b><br>${list.length} murid</div></div>
    <table class="pr-table"><thead><tr><th>Nama</th><th>TP</th><th>Deskriptor</th><th>Eviden</th><th>Status</th></tr></thead><tbody>${rows||'<tr><td colspan="5">Tiada murid</td></tr>'}</tbody></table>
    <div style="margin-top:30px;font-size:12px;">Disediakan oleh: ______________________ &nbsp;&nbsp;&nbsp; Disahkan oleh (PGB/PK1): ______________________</div>
  `;
  window.print();
  logActivity('Cetak Laporan Kelas', cls);
}

function printSchoolReport(){
  const classNames = DB.meta.classes;
  const activeStudents = DB.students.filter(s=>!s.deleted);
  const overallAvg = (activeStudents.reduce((sum,s)=>sum+tpOf(s),0)/Math.max(1,activeStudents.length)).toFixed(2);
  const classSections = classNames.map(cls=>{
    const list = activeStudents.filter(s=>s.class===cls);
    if(list.length===0) return '';
    const rows = list.map(s=>{
      const tp = tpOf(s);
      const ev = (DB.evidenceAll[s.id]||[]).filter(e=>!e.deleted).length;
      return `<tr><td>${s.name}</td><td>TP${tp}</td><td>${ev}</td></tr>`;
    }).join('');
    const clsAvg = (list.reduce((sum,s)=>sum+tpOf(s),0)/list.length).toFixed(2);
    return `<h3 style="font-size:13.5px;margin-top:18px;">${cls} — ${list.length} murid (Purata TP: ${clsAvg})</h3>
      <table class="pr-table"><thead><tr><th>Nama</th><th>TP</th><th>Eviden</th></tr></thead><tbody>${rows}</tbody></table>`;
  }).join('');
  document.getElementById('printArea').innerHTML = `
    <div class="pr-header"><div><h1>Laporan Tahunan PBD Sekolah — Pendidikan Islam</h1><div style="font-size:12px;color:#555;">Dijana pada ${new Date().toLocaleDateString('ms-MY')}</div></div>
    <div style="text-align:right;font-size:12px;"><b>SJK(C) Ladang Grisek</b><br>Kod: JBC1049 &middot; Sesi ${new Date().getFullYear()}</div></div>
    <table class="pr-table"><tr><th style="width:30%">Jumlah Murid</th><td>${activeStudents.length}</td></tr>
    <tr><th>Jumlah Kelas</th><td>${classNames.length}</td></tr>
    <tr><th>Purata TP Sekolah</th><td>${overallAvg}</td></tr></table>
    ${classSections}
    <div style="margin-top:30px;font-size:12px;">Disediakan oleh (Ketua Panitia): ______________________ &nbsp;&nbsp;&nbsp; Disahkan oleh (Pengetua/GB): ______________________</div>
  `;
  window.print();
  logActivity('Cetak Laporan Tahunan Sekolah', '');
}

function exportStudentsCSV(){
  const cls = VIEW.classFilter;
  const list = DB.students.filter(s=> !s.deleted && (cls==='ALL' || s.class===cls));
  const header = ['Nama','Kelas','TP','Deskriptor','Status Pengesahan','Jumlah Eviden'];
  const rows = list.map(s=>{
    const tp = tpOf(s);
    const ev = (DB.evidenceAll[s.id]||[]).filter(e=>!e.deleted).length;
    const verified = DB.verifiedAll[s.id] ? 'Disahkan' : 'Belum Disahkan';
    return [s.name, s.class, 'TP'+tp, TP_DESC[tp], verified, ev];
  });
  const csvContent = [header, ...rows].map(r=> r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob = new Blob(['\ufeff'+csvContent], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'senarai-murid-pbd-'+(cls==='ALL'?'semua':cls.replace(/\s+/g,'-'))+'.csv';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  logActivity('Eksport CSV', cls);
}

/* ============ MODAL HELPERS ============ */
function showModal(html){
  const bg = document.createElement('div');
  bg.className='modal-bg'; bg.id='modalBg';
  bg.innerHTML = `<div class="modal">${html}</div>`;
  bg.onclick=(e)=>{ if(e.target.id==='modalBg') closeModal(); };
  document.body.appendChild(bg);
}
function closeModal(){ const m=document.getElementById('modalBg'); if(m) m.remove(); }

boot();

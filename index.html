<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pengurusan Eviden PBD — Pendidikan Islam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --hijau:#1B7A4B; --hijau-2:#146A40; --hijau-gelap:#0F5233;
  --emas:#D4A73B; --emas-l:#F3E3B8; --emas-d:#A9832A;
  --krim:#F4F7F4; --kad:#FFFFFF; --tulisan:#1E2A24; --tulisan-lembut:#6B7A70;
  --garis:#E6ECE6; --merah:#C0463A; --hijau-ok:#2E8B57;
  --radius:14px; --shadow:0 2px 10px rgba(20,60,40,.07); --shadow-lg:0 12px 34px rgba(20,60,40,.15);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--krim);color:var(--tulisan);font-family:'Inter',sans-serif;font-size:15px;}
h1,h2,h3,.display{font-family:'Inter',sans-serif;font-weight:800;color:var(--hijau-gelap);letter-spacing:-.01em;}
.eyebrow{font-family:'Inter',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-size:11px;color:var(--emas-d);font-weight:700;}
button{font-family:'Inter',sans-serif;cursor:pointer;}
.btn{background:var(--hijau);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13.5px;transition:.15s;box-shadow:0 2px 6px rgba(20,60,40,.18);}
.btn:hover{background:var(--hijau-2);transform:translateY(-1px);}
.btn.gold{background:var(--emas);color:#3A2C0A;}
.btn.gold:hover{filter:brightness(1.05);}
.btn.ghost{background:transparent;color:var(--hijau);border:1.5px solid var(--garis);box-shadow:none;}
.btn.ghost:hover{border-color:var(--hijau);transform:none;background:#fff;}
.btn.danger{background:#fff;color:var(--merah);border:1.5px solid var(--merah);box-shadow:none;}
.btn.danger:hover{background:var(--merah);color:#fff;transform:none;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
input,select,textarea{font-family:'Inter',sans-serif;padding:10px 12px;border:1.5px solid var(--garis);border-radius:9px;font-size:14px;background:#fff;color:var(--tulisan);width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--hijau);box-shadow:0 0 0 3px rgba(27,122,75,.1);}
label{font-size:12px;font-weight:700;color:var(--tulisan-lembut);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em;}
.field{margin-bottom:14px;}
.card{background:var(--kad);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;border:1px solid rgba(20,60,40,.05);}
.hidden{display:none !important;}
#app{min-height:100vh;}

/* geometric star pattern (Islamic motif) as subtle background */
.geo-pattern{
  background-image:
    radial-gradient(circle at 0 0, rgba(255,255,255,.06) 1.5px, transparent 1.6px),
    radial-gradient(circle at 12px 12px, rgba(255,255,255,.06) 1.5px, transparent 1.6px);
  background-size:24px 24px;
}

/* LOGIN */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(160deg, #DCEEE1 0%, #EAF3E6 35%, #F3EFDD 70%, #EFEAD8 100%);}
.login-box{width:100%;max-width:390px;background:var(--kad);border-radius:20px;box-shadow:var(--shadow-lg);padding:36px 32px;border:1px solid var(--garis);}
.login-mark{width:52px;height:52px;border-radius:14px;background:var(--hijau);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px;box-shadow:0 6px 16px rgba(20,60,40,.25);}
.login-box h1{font-size:22px;margin:0 0 4px;text-align:center;}
.login-box p.sub{color:var(--tulisan-lembut);font-size:13px;margin:0 0 24px;line-height:1.4;text-align:center;}
.login-box .sub-line1{display:block;font-size:14.5px;font-weight:700;color:var(--hijau-gelap);margin-bottom:3px;}
.login-box .sub-line2{display:block;font-size:12.5px;font-weight:500;}
.role-toggle{display:flex;gap:8px;margin-bottom:18px;background:var(--krim);padding:4px;border-radius:11px;}
.role-toggle button{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:700;color:var(--tulisan-lembut);transition:.15s;}
.role-toggle button.active{background:var(--hijau);color:#fff;box-shadow:0 2px 6px rgba(20,60,40,.25);}
.login-err{color:var(--merah);font-size:13px;margin-top:10px;min-height:16px;font-weight:600;}
.login-hint{margin-top:20px;font-size:11.5px;color:var(--tulisan-lembut);background:var(--krim);padding:12px 14px;border-radius:10px;line-height:1.7;border:1px dashed var(--garis);}

/* TOP NAVBAR (matches Khatam Tracker style) */
.topnav{background:var(--hijau);position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.topnav-row1{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 20px 8px;}
.tn-brand{display:flex;align-items:center;gap:9px;min-width:0;}
.tn-logo{font-size:19px;flex-shrink:0;}
.tn-title{font-weight:800;font-size:15.5px;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tn-tabs-row{max-width:1280px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 20px 10px;}
.tn-tabs-row::-webkit-scrollbar{display:none;}
.tn-item{display:flex;align-items:center;gap:6px;white-space:nowrap;padding:8px 13px;border-radius:9px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);font-size:13px;font-weight:700;flex-shrink:0;border-bottom:2.5px solid transparent;}
.tn-item span{font-size:14px;}
.tn-item:hover{color:#fff;}
.tn-item.active{color:#fff;background:rgba(255,255,255,.18);border-bottom-color:var(--emas);}
.tn-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.tn-user{background:rgba(255,255,255,.14);color:#fff;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:20px;white-space:nowrap;}
.tn-logout{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.3);padding:7px 13px;border-radius:20px;font-size:12.5px;font-weight:700;white-space:nowrap;}
.tn-logout:hover{background:rgba(255,255,255,.2);}
.main-area{flex:1;min-width:0;}
.wrap{max-width:1180px;margin:0 auto;padding:22px 20px 60px;}
@media(max-width:640px){
  .topnav-row1{padding:10px 14px 8px;}
  .tn-user{display:none;}
  .tn-title{font-size:13.5px;}
  .wrap{padding:16px 14px 50px;}
  .tn-tabs-row{padding:0 14px 9px;gap:5px;}
  .tn-item{padding:7px 10px;font-size:12px;}
  .tn-item span{font-size:13px;}
  .tn-logout{padding:6px 10px;font-size:11.5px;}
}

/* HEADER / SCHOOL BANNER */
.school-banner{background:linear-gradient(120deg,var(--hijau) 0%,var(--hijau-gelap) 100%);border-radius:var(--radius);padding:22px 26px;color:#fff;display:flex;align-items:center;gap:16px;margin-bottom:18px;}
.school-banner .sb-emoji{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.school-banner .sb-name{font-size:19px;font-weight:800;color:#fff;}
.school-banner .sb-meta{font-size:12.5px;color:rgba(255,255,255,.75);margin-top:2px;}
.sb-clock{text-align:right;flex-shrink:0;border-left:1px solid rgba(255,255,255,.25);padding-left:16px;}
.sb-clock-time{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700;color:#fff;letter-spacing:.03em;}
.sb-clock-date{font-size:11.5px;color:rgba(255,255,255,.75);margin-top:2px;}
@media(max-width:640px){ .school-banner{flex-wrap:wrap;} .sb-clock{border-left:none;border-top:1px solid rgba(255,255,255,.25);padding:10px 0 0;text-align:left;width:100%;} }
.page-head{margin-bottom:6px;}
.page-head h1{margin:4px 0 0;font-size:22px;}
@media(max-width:640px){ .page-head h1{font-size:19px;} .school-banner{padding:16px 18px;} .school-banner .sb-name{font-size:16px;} }

/* GRID/STATS */
.grid-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0 6px;}
.stat-card{background:var(--kad);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 14px;border:1px solid var(--garis);text-align:center;}
.stat-card .ic{font-size:24px;display:block;margin-bottom:6px;}
.stat-card .n{font-size:28px;color:var(--hijau-gelap);font-weight:800;}
.stat-card .l{font-size:11px;color:var(--tulisan-lembut);font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}
@media(max-width:640px){ .grid-cards{grid-template-columns:repeat(2,1fr);gap:9px;} .stat-card{padding:14px 8px;} .stat-card .n{font-size:22px;} .stat-card .ic{font-size:19px;} .stat-card .l{font-size:9.5px;} }

/* STUDENT LIST (guru dashboard) */
.student-list{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.student-row{background:var(--kad);border-radius:12px;box-shadow:var(--shadow);padding:13px 16px;border:1px solid var(--garis);cursor:pointer;transition:.15s;}
.student-row:hover{box-shadow:var(--shadow-lg);border-color:rgba(212,167,59,.4);}
.sc-top{display:flex;align-items:center;gap:12px;}
.sc-avatar{width:40px;height:40px;border-radius:50%;background:var(--emas-l);color:var(--emas-d);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.sc-name{font-weight:800;font-size:13.5px;letter-spacing:.01em;}
.sc-class{font-size:11.5px;color:var(--tulisan-lembut);}
.sc-right{margin-left:auto;text-align:right;flex-shrink:0;}
.sc-ev{font-size:11px;color:var(--tulisan-lembut);}
.sc-bar-track{height:6px;background:var(--garis);border-radius:4px;margin-top:10px;overflow:hidden;}
.sc-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--hijau),var(--hijau-2));}

/* TABLES (admin) */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:480px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--tulisan-lembut);padding:10px 12px;border-bottom:2px solid var(--garis);font-weight:700;}
td{padding:12px;border-bottom:1px solid var(--garis);}
tr:hover td{background:#F5F9F5;}
.trow{display:flex;align-items:center;gap:9px;}
.mini-avatar{width:28px;height:28px;border-radius:50%;background:var(--emas-l);color:var(--emas-d);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10.5px;flex-shrink:0;}

.pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11.5px;font-weight:800;letter-spacing:.02em;}
.pill.tp1,.pill.tp2{background:#FBEAE6;color:var(--merah);}
.pill.tp3,.pill.tp4{background:#FBF1DE;color:#9A7623;}
.pill.tp5,.pill.tp6{background:#E4F0E6;color:var(--hijau-ok);}
.row-actions{display:flex;gap:8px;}
.row-actions button{padding:6px 11px;font-size:12px;border-radius:7px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:30px 0 4px;}
.section-head h2{font-size:18px;margin:0;}
.toolbar{display:flex;gap:10px;align-items:center;margin:14px 0;flex-wrap:wrap;}
.tajuk-subtab{padding:9px 18px;border-radius:9px;border:1.5px solid var(--garis);background:#fff;color:var(--tulisan-lembut);font-weight:700;font-size:13.5px;margin-right:8px;}
.tajuk-subtab.active{background:var(--hijau);color:#fff;border-color:var(--hijau);}
.toolbar select,.toolbar input{width:auto;min-width:170px;}
.empty{padding:44px 20px;text-align:center;color:var(--tulisan-lembut);}
.empty .em-ic{font-size:30px;margin-bottom:8px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(10,20,17,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(2px);}
.modal{background:#fff;border-radius:16px;padding:30px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal h3{margin-top:0;font-size:19px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--hijau);color:#fff;padding:12px 22px;border-radius:30px;font-size:13.5px;font-weight:700;box-shadow:0 8px 26px rgba(0,0,0,.25);z-index:200;}
.toast.err{background:var(--merah);}

/* STUDENT PROFILE */
.profile-banner{background:linear-gradient(120deg,var(--hijau) 0%,var(--hijau-gelap) 100%);border-radius:var(--radius);padding:24px 26px;color:#fff;}
.profile-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;}
.profile-id{display:flex;align-items:center;gap:14px;}
.pf-avatar{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.35);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0;}
.profile-id .name{font-size:19px;color:#fff;font-weight:800;}
.profile-id .meta{color:rgba(255,255,255,.72);font-size:12.5px;margin-top:2px;}
.tp-badge{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);border-radius:14px;padding:12px 20px;text-align:center;min-width:100px;}
.tp-badge .num{font-size:28px;font-weight:800;color:var(--emas-l);}
.tp-badge .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;opacity:.85;color:#fff;}
.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:18px;}
@media(max-width:820px){.two-col{grid-template-columns:1fr;}}
@media(max-width:640px){.profile-id .name{font-size:16.5px;} .pf-avatar{width:44px;height:44px;font-size:15px;} .tp-badge{padding:10px 16px;} .tp-badge .num{font-size:24px;}}
.ev-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--garis);align-items:center;}
.ev-item:last-child{border-bottom:none;}
.ev-thumb{width:50px;height:50px;border-radius:9px;object-fit:cover;background:var(--krim);border:1px solid var(--garis);flex-shrink:0;}
.ev-thumb.pdf{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--hijau);}
.ev-info{flex:1;min-width:0;}
.ev-info .t{font-weight:700;font-size:13.5px;}
.ev-info .d{font-size:11.5px;color:var(--tulisan-lembut);margin-top:1px;}
.rate-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}

/* PRINT */
#printArea{display:none;}

/* TP REFERENCE GUIDE */
.tpref-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px;}
@media(max-width:700px){.tpref-grid{grid-template-columns:1fr;}}
.tpref-card{background:var(--kad);border:2px solid var(--garis);border-radius:var(--radius);padding:16px 18px;display:flex;gap:14px;align-items:flex-start;box-shadow:var(--shadow);}
.tpref-num{font-size:44px;font-weight:900;line-height:1;flex-shrink:0;min-width:44px;font-family:'Inter',sans-serif;}
.tpref-title{font-weight:800;font-size:14.5px;color:var(--tulisan);}
.tpref-sub{font-weight:600;font-size:12px;color:var(--tulisan-lembut);}
.tpref-desc{font-size:12.5px;color:var(--tulisan-lembut);margin:6px 0;line-height:1.5;}
.tpref-list{margin:4px 0 0;padding-left:18px;font-size:12.5px;color:var(--tulisan);line-height:1.6;}
.tpref-list li{margin-bottom:2px;}
@page{ size:A4; margin:14mm; }
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{display:block;position:absolute;top:0;left:0;width:100%;padding:20px 30px;}
  .no-print{display:none !important;}
}
.pr-header{display:flex;justify-content:space-between;border-bottom:3px solid #0E4C42;padding-bottom:10px;margin-bottom:16px;}
.pr-header h1{margin:0;font-size:20px;}
.pr-table{width:100%;border-collapse:collapse;margin-bottom:14px;}
.pr-table th,.pr-table td{border:1px solid #ccc;padding:6px 8px;font-size:12px;text-align:left;}
</style>
</head>
<body>
<div id="app"></div>
<div id="printArea"></div>

<script>
/* ============ STORAGE HELPERS (via Google Apps Script + Google Sheets) ============ */
const HARDCODED_API_URL = 'https://script.google.com/macros/s/AKfycbxpgN7f49vUE45AepyqZOWJinETbn7ucz052UtoM1xzVcSabpd1oF8yX-q73DEniT5H/exec';
let API_URL = localStorage.getItem('pbd_api_url') || HARDCODED_API_URL;

async function apiCall(payload, method='POST'){
  if(!API_URL){ toast('Sambungan Google Sheets belum ditetapkan.', true); return {__error:true}; }
  try{
    let res;
    if(method==='GET'){
      const params = new URLSearchParams(payload);
      res = await fetch(API_URL+'?'+params.toString());
    } else {
      res = await fetch(API_URL, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(payload)
      });
    }
    const json = await res.json();
    if(!json.ok){ toast('Ralat pelayan: '+(json.error||'tidak diketahui'), true); return {__error:true}; }
    return {__error:false, data:json.data};
  }catch(e){
    toast('Ralat menyimpan data: gagal hubungi Google Sheets.', true);
    return {__error:true};
  }
}
async function sGet(key){
  const result = await apiCall({action:'get', key}, 'GET');
  if(result.__error) return undefined;
  const raw = result.data;
  if(raw===null || raw===undefined) return null;
  try{ return JSON.parse(raw); }catch(e){ return null; }
}
async function sSet(key, value){
  const r = await apiCall({action:'set', key, value: JSON.stringify(value)}, 'POST');
  return r.__error ? null : true;
}
async function uploadFileToDrive(filename, mimeType, base64){
  const r = await apiCall({action:'uploadFile', filename, mimeType, base64}, 'POST');
  return r.__error ? null : r.data;
}
function initials(name){
  return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

/* ============ APP STATE ============ */
let DB = { meta:null, students:[], evidenceAll:{}, notesAll:{}, overridesAll:{}, verifiedAll:{}, anecdotesAll:{}, activityLog:[], topicCriteria:{}, tpDescriptors:{}, reminders:[], checklistAll:{} };
let SESSION = null;
let VIEW = { page:'login', tab:'guru', classFilter:'ALL', studentId:null };

const DEFAULT_CLASSES = ['Tahun 3A','Tahun 3B','Tahun 3E','Tahun 4A','Tahun 4C','Tahun 4D','Tahun 6B','Tahun 6C'];
const DEFAULT_TOPICS_BY_YEAR = {
 "3": [
  "Konsep Nama Allah Al-Alim & Al-Hakim","Konsep Bersuci Dalam Islam","Wahyu Teragung","Adab Tidur",
  "Solat Yang Sempurna","Hadis Yang Muda Dikasihi Yang Tua Dihormati","Adab Menuntut Ilmu",
  "Beriman Kepada Kitab","Konsep Sunat Ab'ad & Haiat","Nabi Muhammad & Masyarakat Mekkah",
  "Konsep Bersyukur","Sunnah Rasulullah"
 ],
 "4": [
  "Pengertian Nama Allah Al-Azim & Al-Hamid","Mari Bersuci","Perjanjian Aqabah Pertama & Kedua",
  "Tutuplah Auratmu","Pengertian Nabi & Rasul","Azan & Iqamah","Sifat Fatonah Nabi Muhammad",
  "Adab Beriadah","Hadis Memuliakan Tetamu","Kufur","Puasa Ramadan","Dakwah",
  "Adab Berjiran","Nifak","Adab Berguru"
 ],
 "6": []
};
function yearOfClass(cls){
  const m = (cls||'').match(/(\d+)/);
  return m ? m[1] : 'Lain';
}
function jantinaOf(name){
  if(/\bbinti\b/i.test(name||'')) return 'P';
  if(/\bbin\b/i.test(name||'')) return 'L';
  return null;
}
function criteriaKey(year, topic){ return year+'|'+topic; }
function getCriteria(year, topic){
  return DB.topicCriteria[criteriaKey(year,topic)] || {rendah:'',sederhana:'',tinggi:''};
}
function hasCriteria(c){ return !!(c && (c.rendah||c.sederhana||c.tinggi)); }
function studentGender(s){
  if(s.gender==='L' || s.gender==='P') return s.gender;
  return jantinaOf(s.name);
}
function yearsFromClasses(){
  const set = new Set();
  (DB.meta.classes||[]).forEach(c=>{ const m=(c||'').match(/(\d+)/); if(m) set.add(m[1]); });
  return Array.from(set);
}
const TP_DESC = {
 1:"Tahu (Mengetahui)", 2:"Faham (Memahami)", 3:"Aplikasi (Mengaplikasi)",
 4:"Analisis (Menganalisis)", 5:"Menilai", 6:"Kreatif (Menjana Idea)"

function getTPText(year, tp){

}

/* ============ INIT / SEED ============ */
async function boot(){
  if(!API_URL){ renderSetup(); return; }
  const [meta0, students0, evidenceAll0, notesAll0, overridesAll0, verifiedAll0, anecdotesAll0, activityLog0, topicCriteria0, tpDescriptors0, reminders0, checklistAll0] = await Promise.all([
    sGet('meta'), sGet('students'), sGet('evidenceAll'), sGet('notesAll'), sGet('overridesAll'),
    sGet('verifiedAll'), sGet('anecdotesAll'), sGet('activityLog'), sGet('topicCriteria'), sGet('tpDescriptors'),
    sGet('reminders'), sGet('checklistAll')
  ]);
  // CRITICAL SAFETY CHECK: undefined means the fetch genuinely FAILED (network/server error) —
  // this is different from null (confirmed: key doesn't exist yet). We must NEVER treat a failed
  // fetch as "empty" and reseed/overwrite, or real data gets destroyed. Retry instead.
  const criticalKeys = {
    meta:meta0, students:students0, evidenceAll:evidenceAll0, notesAll:notesAll0,
    overridesAll:overridesAll0, verifiedAll:verifiedAll0, anecdotesAll:anecdotesAll0,
    activityLog:activityLog0, topicCriteria:topicCriteria0, tpDescriptors:tpDescriptors0,
    reminders:reminders0, checklistAll:checklistAll0
  };
  const failedKeys = Object.keys(criticalKeys).filter(k=>criticalKeys[k]===undefined);
  if(failedKeys.length>0){
    renderBootError(failedKeys);
    return;
  }
  let meta = meta0;
  if(meta===null){
    // confirmed empty sheet — safe to seed fresh defaults
    meta = {
      users:[{username:'admin', password:'admin123', role:'admin', name:'Pentadbir Sistem'}],
      classes:[...DEFAULT_CLASSES],
      topics: JSON.parse(JSON.stringify(DEFAULT_TOPICS_BY_YEAR))
    };
    await sSet('meta', meta);
  } else if(Array.isArray(meta.topics)){
    // migrate old flat topic list (was Tahun 3 content) into per-year structure
    meta.topics = {"3": meta.topics, "4": [], "6": []};
    await sSet('meta', meta);
  } else if(!meta.topics){
    meta.topics = JSON.parse(JSON.stringify(DEFAULT_TOPICS_BY_YEAR));
    await sSet('meta', meta);
  }
  if(meta.topics && Array.isArray(meta.topics["4"]) && meta.topics["4"].length===0 && DEFAULT_TOPICS_BY_YEAR["4"].length>0){
    meta.topics["4"] = [...DEFAULT_TOPICS_BY_YEAR["4"]];
    await sSet('meta', meta);
  }
  DB.meta = meta;
  DB.students = students0 || [];
  DB.evidenceAll = evidenceAll0 || {};
  DB.notesAll = notesAll0 || {};
  DB.overridesAll = overridesAll0 || {};
  DB.verifiedAll = verifiedAll0 || {};
  DB.anecdotesAll = anecdotesAll0 || {};
  DB.activityLog = activityLog0 || [];
  DB.topicCriteria = topicCriteria0 || {};
  DB.tpDescriptors = tpDescriptors0 || {};
  DB.reminders = reminders0 || [];
  DB.checklistAll = checklistAll0 || {};
  let tpSeeded = false;
  if(!DB.tpDescriptors["3"]){ DB.tpDescriptors["3"] = JSON.parse(JSON.stringify(SEED_TP_TEXT_YEAR3)); tpSeeded=true; }
  if(!DB.tpDescriptors["4"]){ DB.tpDescriptors["4"] = JSON.parse(JSON.stringify(SEED_TP_TEXT_YEAR4)); tpSeeded=true; }
  if(!DB.tpDescriptors["6"]){ DB.tpDescriptors["6"] = JSON.parse(JSON.stringify(SEED_TP_TEXT_YEAR6)); tpSeeded=true; }
  if(tpSeeded){ await sSet('tpDescriptors', DB.tpDescriptors); }
  const savedUsername = localStorage.getItem('pbd_session_user');
  if(savedUsername){
    const found = DB.meta.users.find(x=>x.username===savedUsername);
    if(found){ SESSION = found; if(found.role==='admin') { renderAdmin(); } else { renderGuru(); } return; }
    localStorage.removeItem('pbd_session_user');
  }
  renderLogin();
}

/* ============ TP CALCULATION ============ */
function calcTP(evList){
  if(!evList || evList.length===0) return 1;
  const avgRating = evList.reduce((s,e)=>s+Number(e.rating||1),0)/evList.length;
  const countScore = Math.min(evList.length,6)/6;
  const raw = (avgRating/3)*0.65 + countScore*0.35;
  return Math.min(6, Math.max(1, Math.round(raw*6)));
}
function tpOf(student){
  const ov = DB.overridesAll[student.id];
  if(ov!=null) return ov;
  return calcTP((DB.evidenceAll[student.id]||[]).filter(e=>!e.deleted));
}

  if(!VIEW.tab || !['guru','murid','rekod','tajuk','laporan','rujukan','log','selenggara'].includes(VIEW.tab)) VIEW.tab='guru';
  if(VIEW.tab==='murid'){ await paintMurid(); return; }
  if(VIEW.tab==='rekod'){ await paintRekod(); return; }
  if(VIEW.tab==='tajuk'){ await paintTajuk(); return; }
  if(VIEW.tab==='laporan'){ await paintLaporan(); return; }
  if(VIEW.tab==='rujukan'){ await paintRujukan(); return; }
  if(VIEW.tab==='log'){ await paintLog(); return; }
  if(VIEW.tab==='selenggara'){ await paintSelenggara(); return; }
  await paintAdmin();
}
async function paintAdmin(){
  const el = document.getElementById('app');
  let body='';
  if(VIEW.tab==='guru') body = adminGuruHTML();
  const heading = 'Urus Guru';
  const content = `
    <div class="page-head"><span class="eyebrow">Panel Pentadbir</span><h1>${heading}</h1></div>
    ${body}`;
  el.innerHTML = appShell(VIEW.tab, content);
  wireShellNav(navigateShared);
}

/* --- Shared nav handler covering Dashboard/Murid/Rekod/Tajuk/Laporan/Rujukan/Admin tabs --- */
function navigateShared(k){
  if(SESSION.role==='admin'){
    if(k==='murid') paintMurid();
    else if(k==='rekod') paintRekod();
    else if(k==='tajuk') paintTajuk();
    else if(k==='laporan') paintLaporan();
    else if(k==='rujukan') paintRujukan();
    else if(k==='log') paintLog();
    else if(k==='sampah') paintSampah();
    else if(k==='selenggara') paintSelenggara();
    else { VIEW.tab=k; paintAdmin(); }
  } else {
    if(k==='dash') paintGuru();
    else if(k==='murid') paintMurid();
    else if(k==='rekod') paintRekod();
    else if(k==='tajuk') paintTajuk();
    else if(k==='sampah') paintSampah();
    else if(k==='laporan') paintLaporan();
    else paintRujukan();
  }
}

async function addReminder(){
  const title = document.getElementById('remTitle').value.trim();
  const date = document.getElementById('remDate').value;
  if(!title||!date){ toast('Sila isi tajuk dan tarikh peringatan.', true); return; }
  DB.reminders.push({title, date});
  const ok = await sSet('reminders', DB.reminders);
  if(ok===null){ DB.reminders.pop(); toast('Gagal simpan. Cuba lagi.', true); return; }
  toast('Peringatan ditambah.'); paintSelenggara();
}
async function deleteReminder(i){
  const removed = DB.reminders.splice(i,1);
  const ok = await sSet('reminders', DB.reminders);
  if(ok===null){ DB.reminders.splice(i,0,removed[0]); toast('Gagal padam. Cuba lagi.', true); return; }
  toast('Peringatan dipadam.'); paintSelenggara();
}

async function saveCriteria(year, topicIdx){
  const topic = DB.meta.topics[year][topicIdx];
  const key = criteriaKey(year, topic);
  const prev = DB.topicCriteria[key];
  DB.topicCriteria[key] = {
    rendah: document.getElementById('critRendah').value.trim(),
    sederhana: document.getElementById('critSederhana').value.trim(),
    tinggi: document.getElementById('critTinggi').value.trim()
  };
  const ok = await sSet('topicCriteria', DB.topicCriteria);
  if(ok===null){ if(prev) DB.topicCriteria[key]=prev; else delete DB.topicCriteria[key]; toast('Gagal simpan. Cuba lagi.', true); return; }
  closeModal(); toast('Kriteria disimpan.'); logActivity('Kemas Kini Kriteria Tajuk', topic); paintTajuk();
}

  if(ok===null){ if(prev!=null) DB.tpDescriptors[year][tp]=prev; else delete DB.tpDescriptors[year][tp]; toast('Gagal simpan. Cuba lagi.', true); return; }

}

function downloadBackup(){
  const backup = {
    exportedAt: new Date().toISOString(),
    meta: DB.meta, students: DB.students, evidenceAll: DB.evidenceAll,
    notesAll: DB.notesAll, overridesAll: DB.overridesAll, verifiedAll: DB.verifiedAll,
    anecdotesAll: DB.anecdotesAll, activityLog: DB.activityLog
  };
  const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'backup-eviden-pbd-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  logActivity('Muat Turun Backup', '');
}
async function importBackup(file){
  if(!file) return;
  if(!confirm('Import akan GANTIKAN semua data semasa (murid, eviden, catatan, dll) dengan data dari fail backup ini. Teruskan?')) return;
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!data.meta || !data.students){ toast('Fail backup tidak sah.', true); return; }
    toast('Mengimport data...');
    await Promise.all([
      sSet('meta', data.meta), sSet('students', data.students), sSet('evidenceAll', data.evidenceAll||{}),
      sSet('notesAll', data.notesAll||{}), sSet('overridesAll', data.overridesAll||{}),
      sSet('verifiedAll', data.verifiedAll||{}), sSet('anecdotesAll', data.anecdotesAll||{}),
      sSet('activityLog', data.activityLog||[])
    ]);
    DB.meta = data.meta; DB.students = data.students; DB.evidenceAll = data.evidenceAll||{};
    DB.notesAll = data.notesAll||{}; DB.overridesAll = data.overridesAll||{}; DB.verifiedAll = data.verifiedAll||{};
    DB.anecdotesAll = data.anecdotesAll||{}; DB.activityLog = data.activityLog||[];
    toast('Import berjaya.'); logActivity('Import Backup', file.name); paintLog();
  }catch(e){
    toast('Gagal membaca fail backup.', true);
  }
}

async function downloadFullSystemBackup(){
  toast('Menyediakan Whole System backup...');
  const r = await apiCall({action:'getAllKV'}, 'POST');
  if(r.__error){ toast('Gagal ambil Whole System backup dari Google Sheets.', true); return; }
  const rawKV = r.data; // {key: rawStringValue, ...} — SEMUA key, termasuk yang akan datang
  const backup = { exportedAt: new Date().toISOString(), type:'FULL_SYSTEM_BACKUP', kv: rawKV };
  const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'whole-system-backup-pbd-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  logActivity('Muat Turun Whole System', '');
  toast('Whole System backup berjaya dimuat turun.');
}

async function importFullSystemBackup(file){
  if(!file) return;
  if(!confirm('Import Whole System akan GANTIKAN SEMUA key dalam Google Sheets dengan data dari fail backup ini. Tindakan ini serius dan tidak boleh dibatalkan. Teruskan?')) return;
  try{
    const text = await file.text();
    const backup = JSON.parse(text);
    if(!backup.kv || backup.type!=='FULL_SYSTEM_BACKUP'){ toast('Fail bukan Whole System backup yang sah.', true); return; }
    toast('Mengimport Whole System backup...');
    const keys = Object.keys(backup.kv);
    for(const k of keys){
      let parsed;
      try{ parsed = JSON.parse(backup.kv[k]); }catch(e){ parsed = backup.kv[k]; }
      const ok = await sSet(k, parsed);
      if(ok===null){ toast('Gagal simpan key: '+k+'. Import dihentikan separa — sila cuba lagi.', true); return; }
    }
    toast('Import Whole System berjaya. Sila muat semula halaman (refresh).');
    logActivity('Import Whole System', file.name);
  }catch(e){
    toast('Gagal membaca fail Whole System backup.', true);
  }
}

  `);

let _csvParsedRows = [];
function handleCSVFileSelect(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const text = String(reader.result);
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    const rows = lines.slice(1).map(l=>{
      const parts = l.split(',').map(s=>s.trim().replace(/^"|"$/g,''));
      return {name:parts[0]||'', class:parts[1]||'', gender:(parts[2]||'').toUpperCase()};
    }).filter(r=>r.name && r.class);
    _csvParsedRows = rows;
    const preview = rows.slice(0,10).map(r=>`<div>${r.name} — ${r.class}${r.gender?' — '+r.gender:''}</div>`).join('');
    document.getElementById('csvPreview').innerHTML = rows.length ? `<b style="color:var(--hijau-gelap);">${rows.length} murid dikesan.</b><br>${preview}${rows.length>10?'<div>...dan '+(rows.length-10)+' lagi</div>':''}` : '<span style="color:var(--merah);">Tiada baris sah dikesan. Pastikan format: Nama,Kelas</span>';
    document.getElementById('csvImportBtn').disabled = rows.length===0;
  };
  reader.readAsText(file);
}
async function confirmImportCSV(){
  if(_csvParsedRows.length===0) return;
  const btn = document.getElementById('csvImportBtn');
  btn.disabled=true; btn.textContent='Mengimport...';
  const newClasses = Array.from(new Set(_csvParsedRows.map(r=>r.class))).filter(c=>!DB.meta.classes.includes(c));
  if(newClasses.length>0){
    DB.meta.classes.push(...newClasses);
    const okMeta = await sSet('meta', DB.meta);
    if(okMeta===null){ newClasses.forEach(c=>{ const i=DB.meta.classes.indexOf(c); if(i>-1) DB.meta.classes.splice(i,1); }); toast('Gagal simpan kelas baharu. Cuba lagi.', true); btn.disabled=false; btn.textContent='Import'; return; }
  }
  const added = [];
  _csvParsedRows.forEach(r=>{
    const gender = (r.gender==='L'||r.gender==='P') ? r.gender : '';
    const student = {id:'s'+Date.now()+Math.floor(Math.random()*99999), name:r.name, class:r.class, gender};
    DB.students.push(student);
    added.push(student);
  });
  const ok = await sSet('students', DB.students);
  if(ok===null){ added.forEach(a=>{ const idx=DB.students.indexOf(a); if(idx>-1) DB.students.splice(idx,1); }); toast('Gagal import. Cuba lagi.', true); btn.disabled=false; btn.textContent='Import'; return; }
  closeModal(); toast(added.length+' murid berjaya diimport.'); logActivity('Import CSV Murid', added.length+' murid'); paintMurid();
}

async function addClass(){
  const v = document.getElementById('newClass').value.trim();
  if(!v) return;
  DB.meta.classes.push(v);
  const ok = await sSet('meta', DB.meta);
  if(ok===null){ DB.meta.classes.pop(); toast('Gagal simpan. Cuba lagi.', true); return; }
  logActivity('Tambah Kelas', v); paintMurid();
}
async function removeClass(i){
  const removed = DB.meta.classes.splice(i,1)[0];
  const ok = await sSet('meta', DB.meta);
  if(ok===null){ DB.meta.classes.splice(i,0,removed); toast('Gagal padam. Cuba lagi.', true); return; }
  logActivity('Padam Kelas', removed); paintMurid();
}

/* ============ GURU DASHBOARD ============ */
async function renderGuru(){
  VIEW.page='guru'; VIEW.tab='dash';
  await paintGuru();
}
async function paintGuru(){
  VIEW.page='guru'; VIEW.tab='dash';
  const el = document.getElementById('app');
  const cls = VIEW.classFilter;
  const activeStudents = DB.students.filter(s=>!s.deleted);
  activeStudents.forEach(s=>{
    s._evidence = (DB.evidenceAll[s.id] || []).filter(e=>!e.deleted);
    s._override = (DB.overridesAll[s.id]!=null) ? DB.overridesAll[s.id] : null;
  });
  const tpCounts=[0,0,0,0,0,0];
  activeStudents.forEach(s=> tpCounts[tpOf(s)-1]++);
  const list = activeStudents.filter(s=> cls==='ALL' || s.class===cls);
  const opts = ['ALL',...DB.meta.classes].map(c=>`<option value="${c}" ${c===cls?'selected':''}>${c==='ALL'?'Semua Kelas':c}</option>`).join('');
  const cards = list.map(s=>{
    const tp = tpOf(s);
    const pct = Math.round((tp/6)*100);
    const barColor = tp<=2?'var(--merah)':tp<=4?'var(--emas)':'var(--hijau)';
    return `<div class="student-row" onclick="openStudent('${s.id}')">
      <div class="sc-top"><div class="sc-avatar">${initials(s.name)}</div>

        <div class="sc-right"><span class="pill tp${tp}">TP${tp}</span><div class="sc-ev">${s._evidence.length} eviden</div></div>
      </div>
      <div class="sc-bar-track"><div class="sc-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    </div>`;
  }).join('');
  const avgTP = (tpCounts.reduce((s,c,i)=>s+c*(i+1),0)/Math.max(1,activeStudents.length)).toFixed(1);
  const noEvidence = activeStudents.filter(s=> s._evidence.length===0);
  const notifRows = noEvidence.slice(0,6).map(s=>`
    <div class="ev-item" style="padding:9px 0;">
      <div class="sc-avatar" style="width:34px;height:34px;font-size:11px;">${initials(s.name)}</div>
      <div class="ev-info">
        <div class="t" style="font-size:13px;">${s.name}</div>
        <div class="d">${s.class}</div>
      </div>
      <span class="pill" style="background:#FBEAE6;color:var(--merah);flex-shrink:0;">Belum ada eviden</span>
    </div>`).join('');
  const notifMore = noEvidence.length>6 ? `<div style="font-size:12px;color:var(--tulisan-lembut);text-align:center;padding-top:8px;">+${noEvidence.length-6} murid lagi</div>` : '';
  const lowTP = activeStudents.filter(s=> s._evidence.length>0 && tpOf(s)<=2);
  const lowTPRows = lowTP.slice(0,8).map(s=>`
    <div class="ev-item" style="padding:9px 0;">
      <div class="sc-avatar" style="width:34px;height:34px;font-size:11px;">${initials(s.name)}</div>
      <div class="ev-info">
        <div class="t" style="font-size:13px;">${s.name}</div>
        <div class="d">${s.class} &middot; ${s._evidence.length} eviden</div>
      </div>
      <span class="pill tp${tpOf(s)}" style="flex-shrink:0;">TP${tpOf(s)}</span>
    </div>`).join('');
  const lowTPMore = lowTP.length>8 ? `<div style="font-size:12px;color:var(--tulisan-lembut);text-align:center;padding-top:8px;">+${lowTP.length-8} murid lagi</div>` : '';
  const today = new Date();
  const activeReminders = (DB.reminders||[]).filter(r=>{ const d=new Date(r.date); return Math.ceil((d-today)/(1000*60*60*24)) >= -1; }).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const reminderCards = activeReminders.map(r=>{
    const d = new Date(r.date);
    const diff = Math.ceil((d-today)/(1000*60*60*24));
    const urgent = diff<=7;
    const bg = diff<=0 ? 'background:#FBEAE6;border:1px solid #E57373;' : urgent ? 'background:#FFF8E1;border:1px solid var(--emas);' : 'background:#F1F8F4;border:1px solid var(--garis);';
    const icon = diff<=0 ? '🚨' : urgent ? '⚠️' : '🗓️';
    const label = diff<0 ? `Tamat ${Math.abs(diff)} hari lepas` : diff===0 ? 'Hari ini!' : `${diff} hari lagi`;
    return `<div class="card" style="margin-top:8px;${bg}display:flex;align-items:center;gap:12px;padding:12px 16px;">
      <span style="font-size:20px;">${icon}</span>
      <div><b style="color:var(--hijau-gelap);font-size:13.5px;">${r.title}</b><br><span style="font-size:12px;color:var(--tulisan-lembut);">${d.toLocaleDateString('ms-MY')} — ${label}</span></div>
    </div>`;
  }).join('');
  const classNames = DB.meta.classes;
  const classAvgs = classNames.map(c=>{
    const studs = activeStudents.filter(s=>s.class===c);
    if(studs.length===0) return 0;
    return +(studs.reduce((sum,s)=>sum+tpOf(s),0)/studs.length).toFixed(2);
  });

  const content = `
    <div class="school-banner">
      <div class="sb-emoji">📗</div>
      <div style="flex:1;"><div class="sb-name">SJK(C) Ladang Grisek</div><div class="sb-meta">Kod: JBC1049 &middot; Panitia Pendidikan Islam &middot; Sesi ${new Date().getFullYear()}</div></div>
      <div class="sb-clock" id="liveClock"><div class="sb-clock-time" id="liveClockTime">--:--:--</div><div class="sb-clock-date" id="liveClockDate">—</div></div>
    </div>
    <div class="grid-cards">
      <div class="stat-card"><span class="ic">🎓</span><div class="n">${activeStudents.length}</div><div class="l">Jumlah Murid</div></div>
      <div class="stat-card"><span class="ic">🏫</span><div class="n">${DB.meta.classes.length}</div><div class="l">Kelas</div></div>
      <div class="stat-card"><span class="ic">📎</span><div class="n">${activeStudents.reduce((a,s)=>a+s._evidence.length,0)}</div><div class="l">Jumlah Eviden</div></div>
      <div class="stat-card"><span class="ic">⭐</span><div class="n">${avgTP}</div><div class="l">Purata TP</div></div>
    </div>
    <div class="card" style="margin-top:12px;background:linear-gradient(120deg,var(--emas-l),#fff);border:1px solid var(--emas);display:flex;align-items:center;gap:12px;">
      <span style="font-size:24px;">📢</span>
      <div><b style="color:var(--hijau-gelap);">Selamat datang, Cikgu ${SESSION.name}!</b><br><span style="color:var(--tulisan-lembut);">Tahun ini sekolah berakhir pada ${SCHOOL_YEAR_END_LABEL} (${schoolYearDaysLeft()} hari lagi).</span></div>
    </div>
    ${reminderCards}
    <div class="two-col" style="margin-top:20px;">
      <div class="card">
        <h2 style="margin-top:0;">Taburan TP Keseluruhan</h2>
        <canvas id="tpDistChart" height="85"></canvas>
      </div>
      <div class="card">
        <h2 style="margin-top:0;">🔔 Notifikasi</h2>
        ${notifRows || '<div class="empty" style="padding:16px;"><div class="em-ic">✅</div>Semua murid sudah ada eviden.</div>'}
        ${notifMore}
      </div>
    </div>
    <div class="section-head"><h2>🔻 TP Rendah (TP1–TP2)</h2></div>
    <div class="card">
      ${lowTPRows || '<div class="empty" style="padding:16px;"><div class="em-ic">✅</div>Tiada murid pada TP1/TP2 buat masa ini.</div>'}
      ${lowTPMore}
    </div>
    <div class="section-head"><h2>Perbandingan TP Antara Kelas</h2></div>
    <div class="card"><canvas id="classCompChart" height="90"></canvas></div>
    <div class="section-head"><h2>Senarai Murid</h2></div>
    <div class="toolbar"><select id="guruClassFilter">${opts}</select></div>
    <div class="student-list">${cards || '<div class="empty"><div class="em-ic">🎓</div>Tiada murid dalam kelas ini.</div>'}</div>
  `;
  el.innerHTML = appShell('dash', content);
  wireShellNav(navigateShared);
  document.getElementById('guruClassFilter').onchange=(e)=>{VIEW.classFilter=e.target.value; paintGuru();};
  startLiveClock();
  new Chart(document.getElementById('tpDistChart'), {
    type:'bar',
    data:{ labels:['TP1','TP2','TP3','TP4','TP5','TP6'],
      datasets:[{label:'Bilangan Murid', data:tpCounts, backgroundColor:['#B5493D','#C97362','#D6A94C','#C79A4B','#5C9B6E','#3E7A4E'], borderRadius:8, maxBarThickness:48}]},
    options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, ticks:{stepSize:1}}}}
  });
  new Chart(document.getElementById('classCompChart'), {
    type:'bar',
    data:{ labels:classNames,
      datasets:[{label:'Purata TP', data:classAvgs, backgroundColor:'#1B7A4B', borderRadius:8, maxBarThickness:48}]},
    options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, max:6}}}
  });
}
const SCHOOL_YEAR_END = new Date(2026,11,4,23,59,59);
const SCHOOL_YEAR_END_LABEL = '04 Disember 2026';
const HARI_MS = ['Ahad','Isnin','Selasa','Rabu','Khamis','Jumaat','Sabtu'];
const BULAN_MS = ['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];
let _clockInterval = null;
function tickLiveClock(){
  const timeEl = document.getElementById('liveClockTime');
  const dateEl = document.getElementById('liveClockDate');
  if(!timeEl || !dateEl){ if(_clockInterval){ clearInterval(_clockInterval); _clockInterval=null; } return; }
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0'), mm = String(d.getMinutes()).padStart(2,'0'), ss = String(d.getSeconds()).padStart(2,'0');
  timeEl.textContent = `${hh}:${mm}:${ss}`;
  dateEl.textContent = `${HARI_MS[d.getDay()]}, ${d.getDate()} ${BULAN_MS[d.getMonth()]} ${d.getFullYear()}`;
}
function startLiveClock(){
  if(_clockInterval) clearInterval(_clockInterval);
  tickLiveClock();
  _clockInterval = setInterval(tickLiveClock, 1000);
}
function schoolYearDaysLeft(){
  const now = new Date();
  return Math.max(0, Math.ceil((SCHOOL_YEAR_END-now)/(1000*60*60*24)));
}

async function openStudent(id){

  VIEW.profileFrom = VIEW.tab || (SESSION.role==='admin' ? 'rekod' : 'dash');
  await paintProfile();
}
async function paintProfile(){
  const el = document.getElementById('app');
  const s = DB.students.find(x=>x.id===VIEW.studentId);
  if(!s){ paintGuru(); return; }
  const allEv = DB.evidenceAll[s.id] || [];
  s._evidence = allEv.filter(e=>!e.deleted);
  const trashedEv = allEv.filter(e=>e.deleted);
  s._override = (DB.overridesAll[s.id]!=null) ? DB.overridesAll[s.id] : null;
  const notes = DB.notesAll[s.id] || {p:'',k:'',c:''};
  const anecdotes = (DB.anecdotesAll[s.id]||[]).slice().sort((a,b)=> a.date<b.date?1:-1);
  const isVerified = !!DB.verifiedAll[s.id];
  const autoTP = calcTP(s._evidence);
  const tp = tpOf(s);
  const isAdminView = SESSION.role==='admin';
  const evRows = s._evidence.slice().sort((a,b)=> a.date<b.date?1:-1).map(ev=>{
    const dotColor = ev.rating==3?'var(--hijau-ok)': ev.rating==2?'var(--emas)':'var(--merah)';
    const thumb = ev.fileType && ev.fileType.startsWith('image') ?
      `<img class="ev-thumb" src="${ev.fileUrl}" onerror="this.style.opacity=0.3">` :
      `<div class="ev-thumb pdf">PDF</div>`;
    return `<div class="ev-item">
      ${thumb}
      <div class="ev-info">
        <div class="t">${ev.topic}</div>
        <div class="d"><span class="rate-dot" style="background:${dotColor}"></span>${ev.date} &middot; ${ratingLabel(ev.rating)}</div>
      </div>
      <div class="row-actions">
        <a class="btn ghost" style="padding:5px 10px;font-size:12px;" href="${ev.fileUrl}" target="_blank" rel="noopener">Lihat</a>
        <button class="btn danger" style="padding:5px 10px;font-size:12px;" onclick="deleteEvidence('${ev.id}')">Padam</button>
      </div>
    </div>`;
  }).join('') || '<div class="empty"><div class="em-ic">📎</div>Belum ada eviden dimuat naik.</div>';
  const trashRows = trashedEv.map(ev=>`<div class="ev-item" style="opacity:.6;">
      <div class="ev-info"><div class="t">${ev.topic}</div><div class="d">${ev.date}</div></div>
      <div class="row-actions">
        <button class="btn ghost" style="padding:5px 10px;font-size:12px;" onclick="restoreEvidence('${ev.id}')">♻ Pulihkan</button>
        <button class="btn danger" style="padding:5px 10px;font-size:12px;" onclick="permanentDeleteEvidence('${ev.id}')">Kekal</button>
      </div>
    </div>`).join('');
  const ancRows = anecdotes.map(a=>`<div class="ev-item" style="padding:9px 0;"><div class="ev-info"><div class="d" style="margin-bottom:2px;">${a.date}</div><div style="font-size:13px;">${a.text}</div></div>
      <button class="btn danger" style="padding:5px 10px;font-size:12px;" onclick="deleteAnecdote('${a.id}')">Padam</button></div>`).join('') || '<div class="empty" style="padding:16px;"><div class="em-ic">📝</div>Tiada anekdot direkod.</div>';
  const studentYear = yearOfClass(s.class);
  const totalTopics = (DB.meta.topics[studentYear]||[]).length;
  const topicsCovered = new Set(s._evidence.map(e=>e.topic)).size;
  const coveragePct = totalTopics>0 ? Math.round((topicsCovered/totalTopics)*100) : 0;
  const checklist = DB.checklistAll[s.id] || [];
  const topicList = DB.meta.topics[studentYear] || [];
  const checklistRows = topicList.map(t=>{
    const checked = checklist.includes(t);
    const hasEv = s._evidence.some(e=>e.topic===t);
    return `<label style="display:flex;align-items:center;gap:9px;padding:7px 0;font-size:13px;cursor:pointer;border-bottom:1px solid var(--garis);">
      <input type="checkbox" ${checked?'checked':''} onchange="toggleChecklist('${t.replace(/'/g,"\\'")}')" style="width:16px;height:16px;flex-shrink:0;">
      <span style="flex:1;${checked?'color:var(--tulisan-lembut);text-decoration:line-through;':''}">${t}</span>
      ${hasEv?'<span style="font-size:11px;color:var(--hijau-ok);flex-shrink:0;">📎 ada eviden</span>':''}
    </label>`;
  }).join('') || '<div class="empty" style="padding:16px;"><div class="em-ic">📚</div>Tiada tajuk untuk Tahun '+studentYear+'.</div>';
  const checklistDone = topicList.filter(t=>checklist.includes(t)).length;

  const content = `
    <div class="no-print"><button class="btn ghost" onclick="navigateShared('${VIEW.profileFrom}')">&larr; Kembali ke Senarai</button></div>
    <div class="profile-banner" style="margin-top:16px;">
      <div class="profile-head">
        <div class="profile-id">
          <div class="pf-avatar">${initials(s.name)}</div>
          <div><div class="name">${s.name}</div><div class="meta">${s.class} &middot; ${s._evidence.length} eviden direkodkan</div></div>
        </div>
        <div class="tp-badge"><div class="num">TP${tp}</div><div class="lbl">${s._override!=null?'Ditetapkan Guru':'Auto-Generate'}</div></div>
      </div>
    </div>
    <div class="card" style="margin-top:14px;">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div style="font-size:13px;color:var(--tulisan-lembut);">Deskriptor: <b style="color:var(--hijau);">${TP_DESC[tp]}</b> ${s._override!=null?`(Auto: TP${autoTP})`:''}</div>
        <span class="pill" style="background:${isVerified?'#E4F0E6':'#FBF1DE'};color:${isVerified?'var(--hijau-ok)':'#9A7623'};">${isVerified?'✅ Disahkan (Penyelarasan)':'⏳ Belum Disahkan'}</span>
      </div>
      <div style="margin-top:12px;">
        <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--tulisan-lembut);margin-bottom:4px;"><span>Liputan Tajuk</span><span>${topicsCovered} / ${totalTopics} tajuk ada eviden</span></div>
        <div class="sc-bar-track"><div class="sc-bar-fill" style="width:${coveragePct}%;background:${coveragePct>=80?'var(--hijau)':coveragePct>=40?'var(--emas)':'var(--merah)'}"></div></div>
      </div>
      <div class="toolbar no-print">
        <button class="btn gold" onclick="openEvidenceModal()">+ Upload Eviden</button>
        <button class="btn ghost" onclick="openOverrideModal()">Override TP</button>
        <button class="btn ghost" onclick="printReport()">🖨 Cetak Laporan</button>
        ${isAdminView ? `<button class="btn ${isVerified?'danger':''}" onclick="toggleVerify()">${isVerified?'Buka Semula Pengesahan':'✔ Sahkan TP'}</button>` : ''}
      </div>
    </div>
    <div class="two-col">
      <div class="card">
        <h2 style="margin-top:0;">Senarai Eviden</h2>
        <div>${evRows}</div>
        ${trashedEv.length>0 ? `<div class="section-head" style="margin-top:18px;"><h2 style="font-size:14px;">🗑️ Tong Sampah Eviden (${trashedEv.length})</h2></div><div>${trashRows}</div>` : ''}
        <div class="section-head" style="margin-top:22px;"><h2 style="font-size:15px;">✅ Senarai Semak Tajuk</h2><span style="font-size:11.5px;color:var(--tulisan-lembut);">${checklistDone}/${topicList.length} ditanda</span></div>
        <p style="font-size:11.5px;color:var(--tulisan-lembut);margin-top:-6px;">Untuk pemerhatian lisan tanpa fail — tanda tajuk yang dah dinilai secara lisan.</p>
        <div>${checklistRows}</div>
      </div>
      <div class="card">
        <h2 style="margin-top:0;">Taburan Penilaian</h2>
        <canvas id="studTPChart" height="130"></canvas>
        <h2 style="margin-top:18px;">Trend TP Mengikut Masa</h2>
        <canvas id="studTrendChart" height="130"></canvas>
        <h2>Catatan Guru</h2>
        <div class="field"><label>Pemerhatian</label><textarea id="noteP" rows="2">${notes.p||''}</textarea></div>
        <div class="field"><label>Komen Prestasi</label><textarea id="noteK" rows="2">${notes.k||''}</textarea></div>
        <div class="field"><label>Cadangan Tindakan Susulan</label><textarea id="noteC" rows="2">${notes.c||''}</textarea></div>
        <button class="btn" onclick="saveNotes()">Simpan Catatan</button>
        <div class="section-head" style="margin-top:22px;"><h2 style="font-size:15px;">Log Anekdot</h2>
          <button class="btn ghost" style="padding:5px 11px;font-size:12px;" onclick="openAnecdoteModal()">+ Tambah</button></div>
        <div>${ancRows}</div>
      </div>
    </div>
  `;
  el.innerHTML = appShell(VIEW.profileFrom, content);
  wireShellNav(navigateShared);
  const rHigh=s._evidence.filter(e=>e.rating==3).length, rMid=s._evidence.filter(e=>e.rating==2).length, rLow=s._evidence.filter(e=>e.rating==1).length;
  new Chart(document.getElementById('studTPChart'), {
    type:'bar',
    data:{labels:['Tinggi','Sederhana','Rendah'],
      datasets:[{data:[rHigh,rMid,rLow], backgroundColor:['#3E7A4E','#C79A4B','#B5493D'], borderRadius:8}]},
    options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });
  // Build TP trend by month
  const sorted = s._evidence.slice().sort((a,b)=>a.date>b.date?1:-1);
  const monthMap = {};
  sorted.forEach(ev=>{
    const m = (ev.date||'').slice(0,7);
    if(!m) return;
    if(!monthMap[m]) monthMap[m]=[];
    monthMap[m].push(Number(ev.rating||1));
  });
  const months = Object.keys(monthMap).sort();
  const trendLabels = months.map(m=>{ const [y,mo]=m.split('-'); return BULAN_MS[Number(mo)-1]+' '+y; });
  const trendData = months.map(m=>{
    const ratings = monthMap[m];
    const avg = ratings.reduce((s,r)=>s+r,0)/ratings.length;
    return Math.min(6,Math.max(1,Math.round((avg/3)*0.65+(ratings.length/6)*0.35*6)));
  });
  if(months.length>0){
    new Chart(document.getElementById('studTrendChart'), {
      type:'line',
      data:{labels:trendLabels, datasets:[{label:'TP', data:trendData, borderColor:'#1B7A4B', backgroundColor:'rgba(27,122,75,.1)', tension:.4, pointBackgroundColor:'#1B7A4B', pointRadius:5, fill:true}]},
      options:{plugins:{legend:{display:false}}, scales:{y:{min:1,max:6,ticks:{stepSize:1,callback:(v)=>'TP'+v}}}}
    });
  } else {
    document.getElementById('studTrendChart').insertAdjacentHTML('afterend','<p style="font-size:12px;color:var(--tulisan-lembut);">Belum cukup data untuk papar trend.</p>');
    document.getElementById('studTrendChart').style.display='none';
  }
}
function ratingLabel(r){ return r==3?'Tinggi':r==2?'Sederhana':'Rendah'; }

/* --- Senarai Semak Tajuk (pemerhatian lisan tanpa fail) --- */
async function toggleChecklist(topic){
  const s = DB.students.find(x=>x.id===VIEW.studentId);
  if(!DB.checklistAll[s.id]) DB.checklistAll[s.id] = [];
  const list = DB.checklistAll[s.id];
  const idx = list.indexOf(topic);
  const wasChecked = idx>-1;
  if(wasChecked) list.splice(idx,1); else list.push(topic);
  const ok = await sSet('checklistAll', DB.checklistAll);
  if(ok===null){ if(wasChecked) list.push(topic); else list.splice(list.indexOf(topic),1); toast('Gagal simpan. Cuba lagi.', true); return; }
  logActivity(wasChecked?'Nyah-tanda Senarai Semak':'Tanda Senarai Semak', s.name+' — '+topic);
  paintProfile();
}

function compressImage(file, maxDim, quality){
  maxDim = maxDim||1280; quality = quality||0.72;
  return new Promise((resolve)=>{
    if(!file.type || !file.type.startsWith('image/')){ resolve(file); return; }
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w>maxDim || h>maxDim){ const scale = maxDim/Math.max(w,h); w=Math.round(w*scale); h=Math.round(h*scale); }
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob((blob)=>{ resolve(blob || file); }, 'image/jpeg', quality);
      };
      img.onerror = ()=>resolve(file);
      img.src = reader.result;
    };
    reader.onerror = ()=>resolve(file);
    reader.readAsDataURL(file);
  });
}

async function saveBulkEvidence(){
  const cls = document.getElementById('bulkClass').value;
  const topic = document.getElementById('bulkTopic').value;
  const date = document.getElementById('bulkDate').value;
  const rating = document.getElementById('bulkRating').value;
  const fileInput = document.getElementById('bulkFile');
  const saveBtn = document.getElementById('bulkSaveBtn');
  const checked = Array.from(document.querySelectorAll('.bulkStudentChk:checked')).map(c=>c.value);
  if(!topic){ toast('Tiada tajuk dipilih untuk kelas ini.', true); return; }
  if(checked.length===0){ toast('Sila pilih sekurang-kurangnya seorang murid.', true); return; }
  if(!fileInput.files[0]){ toast('Sila pilih fail.', true); return; }
  const file = fileInput.files[0];
  if(file.size > 12*1024*1024){ toast('Fail terlalu besar (had 12MB).', true); return; }
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='Memproses...'; }
  const processed = await compressImage(file);
  const mimeType = processed.type || file.type;
  const reader = new FileReader();
  reader.onload = async ()=>{
    const base64 = reader.result.split(',')[1];
    const uploaded = await uploadFileToDrive(file.name, mimeType, base64);
    if(!uploaded || !uploaded.url){ if(saveBtn){saveBtn.disabled=false; saveBtn.textContent='Simpan untuk Murid Dipilih';} toast('Gagal muat naik fail.', true); return; }
    checked.forEach((id,i)=>{
      if(!DB.evidenceAll[id]) DB.evidenceAll[id] = [];
      DB.evidenceAll[id].push({id:'e'+Date.now()+'-'+i, topic, date, rating, fileType:mimeType, fileUrl:uploaded.url});
    });
    const ok = await sSet('evidenceAll', DB.evidenceAll);
    if(ok===null){ toast('Gagal simpan ke Google Sheets.', true); if(saveBtn){saveBtn.disabled=false; saveBtn.textContent='Simpan untuk Murid Dipilih';} return; }
    for(const id of checked){ await unverify(id); }
    closeModal(); toast('Eviden pukal disimpan untuk '+checked.length+' murid.');
    logActivity('Upload Eviden Pukal', cls+' — '+topic+' ('+checked.length+' murid)');
    paintRekod();
  };
  reader.readAsDataURL(processed);
}

async function saveEvidence(){
  const topic=document.getElementById('evTopic').value;
  const date=document.getElementById('evDate').value;
  const rating=document.getElementById('evRating').value;
  const fileInput=document.getElementById('evFile');
  const saveBtn=document.getElementById('evSaveBtn');
  if(!fileInput.files[0]){ toast('Sila pilih fail eviden.', true); return; }
  const file = fileInput.files[0];
  if(file.size > 12*1024*1024){ toast('Fail terlalu besar (had 12MB).', true); return; }
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='Memampat & memuat naik...'; }
  const processed = await compressImage(file);
  const mimeType = processed.type || file.type;
  const reader = new FileReader();
  reader.onload = async ()=>{
    const base64 = reader.result.split(',')[1];
    const uploaded = await uploadFileToDrive(file.name, mimeType, base64);
    if(!uploaded || !uploaded.url){ if(saveBtn){saveBtn.disabled=false; saveBtn.textContent='Simpan Eviden';} toast('Gagal muat naik fail.', true); return; }
    const s = DB.students.find(x=>x.id===VIEW.studentId);
    const ev = {id:'e'+Date.now(), topic, date, rating, fileType:mimeType, fileUrl:uploaded.url};
    if(!DB.evidenceAll[s.id]) DB.evidenceAll[s.id] = [];
    DB.evidenceAll[s.id].push(ev);
    const ok = await sSet('evidenceAll', DB.evidenceAll);
    if(ok===null){ DB.evidenceAll[s.id].pop(); if(saveBtn){saveBtn.disabled=false; saveBtn.textContent='Simpan Eviden';} toast('Gagal simpan ke Google Sheets.', true); return; }
    await unverify(s.id);
    closeModal(); toast('Eviden disimpan.'); logActivity('Upload Eviden', s.name+' — '+topic); paintProfile();
  };
  reader.readAsDataURL(processed);
}
async function deleteEvidence(evId){
  if(!confirm('Padam eviden ini? Boleh dipulihkan dari Tong Sampah Eviden.')) return;
  const s = DB.students.find(x=>x.id===VIEW.studentId);
  const ev = (DB.evidenceAll[s.id]||[]).find(e=>e.id===evId);
  if(!ev) return;
  ev.deleted = true; ev.deletedAt = new Date().toISOString();
  const ok = await sSet('evidenceAll', DB.evidenceAll);
  if(ok===null){ delete ev.deleted; delete ev.deletedAt; toast('Gagal padam. Cuba lagi.', true); return; }
  await unverify(s.id);
  toast('Eviden dipindah ke Tong Sampah.'); logActivity('Padam Eviden (Tong Sampah)', s.name); paintProfile();
}

  const activeStudents = DB.students.filter(s=>!s.deleted);
  const overallAvg = (activeStudents.reduce((sum,s)=>sum+tpOf(s),0)/Math.max(1,activeStudents.length)).toFixed(2);
  const tpCounts=[0,0,0,0,0,0];
  activeStudents.forEach(s=>tpCounts[tpOf(s)-1]++);
  const tpRows = tpCounts.map((c,i)=>`<tr><td>TP${i+1}</td><td>${c} murid</td></tr>`).join('');
  const classRows = classNames.map(cls=>{
    const list = activeStudents.filter(s=>s.class===cls);
    if(list.length===0) return '';
    const clsAvg = (list.reduce((sum,s)=>sum+tpOf(s),0)/list.length).toFixed(2);
    return `<tr><td>${cls}</td><td>${list.length}</td><td>${clsAvg}</td></tr>`;
  }).join('');
  const critical = activeStudents.filter(s=>tpOf(s)<=2);
  const criticalRows = critical.map(s=>`<tr><td>${s.name}</td><td>${s.class}</td><td>TP${tpOf(s)}</td></tr>`).join('') || '<tr><td colspan="3">Tiada murid TP1/TP2 buat masa ini.</td></tr>';
  document.getElementById('printArea').innerHTML = `
    <div class="pr-header"><div><h1>Ringkasan Panitia — Pendidikan Islam</h1><div style="font-size:12px;color:#555;">Dijana pada ${new Date().toLocaleDateString('ms-MY')}</div></div>
    <div style="text-align:right;font-size:12px;"><b>SJK(C) Ladang Grisek</b><br>Kod: JBC1049 &middot; Sesi ${new Date().getFullYear()}</div></div>
    <table class="pr-table"><tr><th style="width:30%">Jumlah Murid</th><td>${activeStudents.length}</td></tr>
    <tr><th>Jumlah Kelas</th><td>${classNames.length}</td></tr>
    <tr><th>Purata TP Sekolah</th><td>${overallAvg}</td></tr></table>
    <h3 style="font-size:13.5px;margin-top:16px;">Taburan TP</h3>
    <table class="pr-table"><thead><tr><th>Tahap</th><th>Bilangan Murid</th></tr></thead><tbody>${tpRows}</tbody></table>
    <h3 style="font-size:13.5px;margin-top:16px;">Purata TP Setiap Kelas</h3>
    <table class="pr-table"><thead><tr><th>Kelas</th><th>Bil. Murid</th><th>Purata TP</th></tr></thead><tbody>${classRows}</tbody></table>
    <h3 style="font-size:13.5px;margin-top:16px;">Murid Kritikal (TP1–TP2) — ${critical.length} orang</h3>
    <table class="pr-table"><thead><tr><th>Nama</th><th>Kelas</th><th>TP</th></tr></thead><tbody>${criticalRows}</tbody></table>
    <div style="margin-top:24px;font-size:12px;">Disediakan oleh (Ketua Panitia): ______________________</div>
  `;
  window.print();
  logActivity('Cetak Ringkasan Panitia', '');
}

function exportStudentsCSV(){
  const cls = VIEW.classFilter;
  const list = DB.students.filter(s=> !s.deleted && (cls==='ALL' || s.class===cls));
  const header = ['Nama','Kelas','TP','Deskriptor','Status Pengesahan','Jumlah Eviden'];
  const rows = list.map(s=>{
    const tp = tpOf(s);
    const ev = (DB.evidenceAll[s.id]||[]).filter(e=>!e.deleted).length;
    const verified = DB.verifiedAll[s.id] ? 'Disahkan' : 'Belum Disahkan';
    return [s.name, s.class, 'TP'+tp, TP_DESC[tp], verified, ev];
  });
  const csvContent = [header, ...rows].map(r=> r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob = new Blob(['\ufeff'+csvContent], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'senarai-murid-pbd-'+(cls==='ALL'?'semua':cls.replace(/\s+/g,'-'))+'.csv';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  logActivity('Eksport CSV', cls);
}

/* ============ MODAL HELPERS ============ */
function showModal(html){
  const bg = document.createElement('div');
  bg.className='modal-bg'; bg.id='modalBg';
  bg.innerHTML = `<div class="modal">${html}</div>`;
  bg.onclick=(e)=>{ if(e.target.id==='modalBg') closeModal(); };
  document.body.appendChild(bg);
}
function closeModal(){ const m=document.getElementById('modalBg'); if(m) m.remove(); }

boot();
